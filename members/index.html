<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANTAJ MEMBERS</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #3d3148;
      --muted: #7c6d85;
      --line: rgba(226, 194, 223, 0.55);
      --pink: #ff7eb7;
      --purple: #a965e8;
      --deep: #8f4eb2;
      --mint: #25bec1;
      --gold: #f6b73c;
      --shadow: 0 18px 42px rgba(150, 94, 171, 0.11);
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background: linear-gradient(180deg, #fff7fb 0%, #f7f0ff 45%, #fffaf4 100%);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .page { min-height: 100vh; }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 28px rgba(177, 122, 174, 0.12);
    }

    .nav-inner {
      width: min(1180px, calc(100% - 32px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: 0.12em;
      color: var(--deep);
      white-space: nowrap;
    }

    .nav-menu {
      display: flex;
      align-items: center;
      gap: 26px;
      font-size: 15px;
      font-weight: 800;
      color: #6b5b75;
    }

    .nav-menu a:hover,
    .nav-menu a.active { color: #b05cc9; }

    .nav-live {
      min-width: 76px;
      text-align: center;
      padding: 9px 13px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: white;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(177, 92, 201, 0.24);
      white-space: nowrap;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 90px;
    }

    .member-hero {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      min-height: 230px;
      padding: 42px;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.96), transparent 26%),
        radial-gradient(circle at 86% 22%, rgba(255, 214, 239, 0.92), transparent 30%),
        radial-gradient(circle at 58% 82%, rgba(255, 245, 215, 0.88), transparent 26%),
        linear-gradient(135deg, #f9d8ee 0%, #e6d9ff 50%, #fff0d8 100%);
      box-shadow: 0 26px 60px rgba(150, 94, 171, 0.18);
    }

    .member-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 8%, rgba(255,255,255,0.52) 48%, transparent 72%),
        radial-gradient(circle at 44% 66%, rgba(255,255,255,0.66), transparent 24%);
      opacity: 0.78;
      pointer-events: none;
    }

    .member-hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 28px;
      align-items: end;
    }

    .hero-kicker {
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.28em;
      color: #a061bb;
      margin-bottom: 12px;
    }

    .hero-title {
      font-size: clamp(42px, 6vw, 74px);
      font-weight: 950;
      letter-spacing: -0.05em;
      color: #ffffff;
      text-shadow: 0 8px 28px rgba(117, 67, 151, 0.26);
      line-height: 0.98;
    }

    .hero-sub {
      margin-top: 16px;
      font-size: 16px;
      font-weight: 800;
      color: #6f527c;
      line-height: 1.55;
    }

    .hero-stat-card {
      width: 230px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow: 0 18px 38px rgba(150, 94, 171, 0.13);
      backdrop-filter: blur(12px);
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(226, 194, 223, 0.48);
    }

    .stat-row:last-child { border-bottom: 0; }
    .stat-label { font-size: 12px; font-weight: 900; color: #9a8aa3; }
    .stat-value { font-size: 20px; font-weight: 950; color: #8f4eb2; }
    .stat-value.live { color: #ff4f98; }

    .member-section {
      margin-top: 22px;
      padding: 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(226, 194, 223, 0.48);
      box-shadow: var(--shadow);
    }

    .member-section:first-of-type { margin-top: 24px; }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .group-title {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.04em;
      color: #4b3659;
    }

    .group-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      box-shadow: 0 0 0 5px rgba(255,255,255,0.78);
    }

    .group-section-leader .group-dot { background: #f6b73c; }
    .group-section-member .group-dot { background: #ff7eb7; }
    .group-section-waiter .group-dot { background: #25bec1; }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .member-card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      border-radius: 15px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(226, 194, 223, 0.55);
      box-shadow: var(--shadow);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .member-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.78;
      pointer-events: none;
    }

    .member-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 38px rgba(150, 94, 171, 0.17);
    }

    .member-card.is-live {
      border-color: rgba(255, 79, 152, 0.58);
    }

    .member-card.is-live::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 2px rgba(255, 79, 152, 0.13);
      pointer-events: none;
    }

    .member-card.leader {
      background: linear-gradient(145deg, rgba(255, 251, 236, .94), rgba(255, 240, 191, .76));
      border-color: rgba(223, 176, 68, .45);
    }

    .member-card.leader::before {
      background:
        radial-gradient(circle at 18% 0%, rgba(255,255,255,.92), transparent 34%),
        linear-gradient(135deg, rgba(255, 231, 156, .42), rgba(255,255,255,0));
    }

    .member-card.member::before {
      background:
        radial-gradient(circle at 20% 4%, rgba(255, 231, 244, 0.9), transparent 34%),
        radial-gradient(circle at 88% 10%, rgba(235, 225, 255, 0.88), transparent 38%);
    }

    .member-card.waiter {
      background: linear-gradient(145deg, rgba(246, 255, 251, .94), rgba(255, 246, 231, .82));
      border-color: rgba(102, 190, 149, .28);
    }

    .member-card.waiter::before {
      background:
        radial-gradient(circle at 22% 0%, rgba(221, 255, 241, .86), transparent 36%),
        linear-gradient(145deg, rgba(236, 255, 247, .72), rgba(255, 244, 223, .6));
    }

    .member-cover {
      position: relative;
      height: 112px;
      background: linear-gradient(135deg, #ffd9eb, #e9dfff 58%, #fff1cf);
      overflow: hidden;
    }

    .member-card.leader .member-cover {
      background: linear-gradient(135deg, #fff6cf, #ffe2a1 58%, #fff9ec);
    }

    .member-card.waiter .member-cover {
      background: linear-gradient(135deg, #d8fff0, #fff0d6 58%, #f2fff9);
    }

    .member-cover::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 35%, rgba(255,255,255,0.68));
      pointer-events: none;
    }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 3;
      display: none;
      padding: 6px 9px;
      border-radius: 8px;
      background: #ff4f98;
      color: white;
      font-size: 11px;
      font-weight: 950;
      box-shadow: 0 8px 18px rgba(255, 79, 152, 0.28);
    }

    .member-card.is-live .live-badge { display: inline-flex; }

    .member-photo-wrap {
      position: relative;
      z-index: 2;
      width: 98px;
      height: 98px;
      margin: -48px auto 0;
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffb7d9, #b89cff);
      box-shadow: 0 12px 26px rgba(155, 124, 255, 0.20);
    }

    .member-card.leader .member-photo-wrap {
      background: linear-gradient(135deg, #fff8d8 0%, #f5c85b 42%, #d79b1f 100%);
      box-shadow: 0 12px 26px rgba(204, 151, 35, .22);
    }

    .member-card.waiter .member-photo-wrap {
      background: linear-gradient(135deg, #baf7df, #ffdca8);
      box-shadow: 0 12px 26px rgba(102, 190, 149, .18);
    }

    .member-card.is-live .member-photo-wrap {
      background: linear-gradient(135deg, #ff4f98, #ffc54d);
      box-shadow: 0 12px 28px rgba(255, 79, 152, 0.22);
    }

    .member-photo {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      border: 3px solid rgba(255,255,255,0.94);
    }

    .member-info {
      position: relative;
      z-index: 2;
      padding: 13px 15px 16px;
      text-align: center;
    }

    .member-name {
      min-width: 0;
      font-size: 16px;
      font-weight: 950;
      color: #4b3659;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      letter-spacing: -0.03em;
    }

    .member-card.leader .member-name { color: #8a5a00; }
    .member-card.waiter .member-name { color: #3f7f68; }

    .member-id {
      margin-top: 5px;
      font-size: 12px;
      font-weight: 800;
      color: #9a8aa3;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .member-role-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .role-chip,
    .link-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

    .role-chip {
      background: rgba(240, 220, 255, 0.75);
      color: #8a4dae;
      border: 1px solid rgba(176, 92, 201, 0.18);
    }

    .member-card.leader .role-chip {
      background: rgba(255, 248, 218, .9);
      color: #a96e00;
      border-color: rgba(214, 156, 38, .32);
    }

    .member-card.waiter .role-chip {
      background: rgba(236, 255, 247, .9);
      color: #4e9b7a;
      border-color: rgba(102, 190, 149, .28);
    }

    .link-chip {
      background: rgba(255,255,255,0.78);
      color: #7c6d85;
      border: 1px solid rgba(226, 194, 223, 0.55);
    }

    .member-card.is-live .link-chip {
      background: rgba(255, 79, 152, 0.10);
      color: #ff3f8d;
      border-color: rgba(255, 79, 152, 0.22);
    }

    .live-title {
      margin-top: 12px;
      min-height: 34px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #7c6d85;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.42;
    }

    .live-title:empty { display: none; }

    .empty-card {
      grid-column: 1 / -1;
      padding: 34px 18px;
      text-align: center;
      border-radius: 15px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(226, 194, 223, 0.55);
      box-shadow: var(--shadow);
      color: #8a7893;
      font-size: 15px;
      font-weight: 900;
    }

    .rank-guide {
      margin-top: 28px;
      padding: 18px;
      border-radius: 15px;
      background: rgba(255,255,255,0.66);
      border: 1px solid rgba(226, 194, 223, 0.50);
      box-shadow: var(--shadow);
    }

    .rank-guide-title {
      font-size: 14px;
      font-weight: 950;
      color: #4b3659;
      margin-bottom: 12px;
    }

    .rank-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .rank-item {
      padding: 7px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(226, 194, 223, 0.48);
      color: #7c6d85;
      font-size: 12px;
      font-weight: 850;
    }

    @media (max-width: 1020px) {
      .member-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .member-hero-content { grid-template-columns: 1fr; }
      .hero-stat-card { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
      .stat-row { padding: 0 14px; border-bottom: 0; border-right: 1px solid rgba(226, 194, 223, 0.48); }
      .stat-row:last-child { border-right: 0; }
    }

    @media (max-width: 900px) {
      .nav-menu { display: none; }
      .member-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .navbar { height: 66px; }
      .logo { font-size: 23px; }
      .nav-inner { width: min(100% - 20px, 1180px); gap: 12px; }
      .nav-live { padding: 8px 12px; font-size: 12px; }

      main {
        width: min(100% - 20px, 1180px);
        padding: 20px 0 60px;
      }

      .member-hero {
        border-radius: 14px;
        min-height: auto;
        padding: 28px 20px;
      }

      .hero-kicker { font-size: 11px; letter-spacing: 0.2em; }
      .hero-title { font-size: 38px; }
      .hero-sub { font-size: 13px; }

      .hero-stat-card {
        padding: 14px;
        grid-template-columns: 1fr;
      }

      .stat-row {
        border-right: 0;
        border-bottom: 1px solid rgba(226, 194, 223, 0.48);
        padding: 9px 0;
      }

      .stat-row:last-child { border-bottom: 0; }

      .member-section {
        margin-top: 14px;
        padding: 14px;
        border-radius: 15px;
      }

      .group-head { margin-bottom: 11px; }
      .group-title { font-size: 18px; }

      .member-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .member-cover { height: 78px; }
      .member-photo-wrap { width: 70px; height: 70px; margin-top: -35px; padding: 4px; }
      .member-photo { border-width: 2px; }
      .member-info { padding: 10px 8px 12px; }
      .member-name { font-size: 13px; }
      .member-id { font-size: 10px; }
      .role-chip, .link-chip { min-height: 24px; padding: 0 8px; font-size: 10px; }
      .live-title { margin-top: 9px; min-height: 30px; font-size: 11px; }
      .live-badge { top: 8px; left: 8px; padding: 5px 8px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="navbar">
      <div class="nav-inner">
        <a class="logo" href="../">FANTAJ</a>

        <nav class="nav-menu">
          <a href="../live/">LIVE</a>
          <a class="active" href="./">MEMBER</a>
          <a href="../notice/">NOTICE</a>
          <a href="../ranking/">RANKING</a>
          <a href="../play/">PLAY</a>
          <a href="../signature/">SIGNATURE</a>
        </nav>

        <a class="nav-live" id="onAirButton" href="../live/">ON AIR</a>
      </div>
    </header>

    <main>
      <section class="member-hero" aria-label="멤버 페이지 안내">
        <div class="member-hero-content">
          <div>
            <div class="hero-kicker">FANTAJ</div>
            <h1 class="hero-title">MEMBERS</h1>
            <p class="hero-sub">판타지유 멤버와 현재 LIVE 상태를 한눈에 확인할 수 있습니다.</p>
          </div>

          <div class="hero-stat-card" aria-label="멤버 요약">
            <div class="stat-row">
              <span class="stat-label">TOTAL</span>
              <span class="stat-value" id="totalCount">-</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">LIVE</span>
              <span class="stat-value live" id="liveCount">-</span>
            </div>
          </div>
        </div>
      </section>

      <div id="memberContent">
        <section class="member-section">
          <div class="member-grid">
            <div class="empty-card">멤버 정보를 불러오는 중입니다...</div>
          </div>
        </section>
      </div>

      <section class="rank-guide" aria-label="추후 직급 순서">
        <div class="rank-guide-title">직급</div>
        <div class="rank-list" id="rankList"></div>
      </section>
    </main>
  </div>

  <script>
    const MEMBERS_JSON_URL = "../data/members.json";
    const LIVE_API_URL = "https://fantj-live.4rgn2004.workers.dev/";
    const DEFAULT_PROFILE_IMAGE = "https://profile.img.sooplive.co.kr/LOGO/sy/sysdemian/sysdemian.jpg";
    const RANK_ORDER = ["부장", "차장", "과장", "비서실장", "대리", "주임", "사원장", "사원1", "사원2", "사원3", "사원4", "인턴", "시급이"];
    const GROUP_ORDER = ["대표", "멤버", "웨이터"];
    const GROUP_CLASS = {
      "대표": "leader",
      "멤버": "member",
      "웨이터": "waiter"
    };

    const memberContent = document.getElementById("memberContent");
    const totalCount = document.getElementById("totalCount");
    const liveCount = document.getElementById("liveCount");
    const onAirButton = document.getElementById("onAirButton");
    const rankList = document.getElementById("rankList");

    let allMembers = [];
    let liveMap = new Map();

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getMemberId(member) {
      return String(member.soopId || member.id || member.userId || "").trim();
    }

    function getProfileImage(userId) {
      const id = String(userId || "").trim();
      if (!id) return DEFAULT_PROFILE_IMAGE;
      const prefix = id.slice(0, 2);
      return `https://profile.img.sooplive.co.kr/LOGO/${prefix}/${id}/${id}.jpg`;
    }

    function fallbackAvatar(img) {
      img.onerror = null;
      img.src = DEFAULT_PROFILE_IMAGE;
    }

    function getStationUrl(userId) {
      return `https://www.sooplive.com/station/${encodeURIComponent(userId)}`;
    }

    function normalizeGroup(group) {
      const value = String(group || "멤버").trim();
      if (GROUP_ORDER.includes(value)) return value;
      return "멤버";
    }

    function normalizeMember(member, index) {
      const id = getMemberId(member);
      return {
        index,
        name: String(member.name || member.nickname || id || "멤버").trim(),
        id,
        group: normalizeGroup(member.group || member.role),
        rank: String(member.rank || member.group || member.role || "멤버").trim()
      };
    }

    function normalizeLiveData(data) {
      const list = Array.isArray(data?.members) ? data.members : (Array.isArray(data) ? data : []);
      liveMap = new Map();

      list.forEach(item => {
        const id = String(item.soopId || item.id || "").trim();
        if (!id || !item.isLive) return;
        liveMap.set(id.toLowerCase(), item);
      });
    }

    function renderRankGuide() {
      rankList.innerHTML = RANK_ORDER.map(rank => `<span class="rank-item">${escapeHtml(rank)}</span>`).join("");
    }

    function renderMemberCard(member) {
      const live = liveMap.get(member.id.toLowerCase());
      const isLive = Boolean(live);
      const name = escapeHtml(member.name);
      const id = escapeHtml(member.id);
      const title = escapeHtml(live?.title || "");
      const href = isLive && live?.url ? live.url : getStationUrl(member.id);
      const linkText = isLive ? "방송 보기" : "방송국";
      const groupClass = GROUP_CLASS[member.group] || "member";

      return `
        <a class="member-card ${groupClass} ${isLive ? "is-live" : ""}" href="${escapeHtml(href)}" target="_blank" rel="noopener">
          <div class="member-cover">
            <span class="live-badge">LIVE</span>
          </div>
          <div class="member-photo-wrap">
            <img class="member-photo" src="${getProfileImage(member.id)}" onerror="fallbackAvatar(this)" alt="${name}" loading="lazy">
          </div>
          <div class="member-info">
            <div class="member-name">${name}</div>
            <div class="member-id">${id}</div>
            <div class="member-role-row">
              <span class="role-chip">${escapeHtml(member.rank || "멤버")}</span>
              <span class="link-chip">${linkText}</span>
            </div>
            ${isLive && title ? `<div class="live-title">${title}</div>` : ""}
          </div>
        </a>
      `;
    }

    function renderGroupSection(groupName, members) {
      const sectionClass = GROUP_CLASS[groupName] || "member";
      const title = escapeHtml(groupName);

      return `
        <section class="member-section group-section-${sectionClass}" aria-label="${title}">
          <div class="group-head">
            <h2 class="group-title"><span class="group-dot"></span>${title}</h2>
          </div>
          <div class="member-grid">
            ${members.map(renderMemberCard).join("")}
          </div>
        </section>
      `;
    }

    function renderMembers() {
      totalCount.textContent = allMembers.length;
      liveCount.textContent = liveMap.size;
      onAirButton.textContent = liveMap.size > 0 ? `ON AIR ${liveMap.size}` : "ON AIR";

      if (!allMembers.length) {
        memberContent.innerHTML = `
          <section class="member-section">
            <div class="member-grid"><div class="empty-card">표시할 멤버가 없습니다.</div></div>
          </section>
        `;
        return;
      }

      const html = GROUP_ORDER.map(groupName => {
        const groupMembers = allMembers
          .filter(member => member.group === groupName)
          .sort((a, b) => a.index - b.index);

        if (!groupMembers.length) return "";
        return renderGroupSection(groupName, groupMembers);
      }).join("");

      memberContent.innerHTML = html || `
        <section class="member-section">
          <div class="member-grid"><div class="empty-card">표시할 멤버가 없습니다.</div></div>
        </section>
      `;
    }

    async function loadMembers() {
      try {
        const [memberResponse, liveResponse] = await Promise.allSettled([
          fetch(MEMBERS_JSON_URL, { cache: "no-store" }),
          fetch(LIVE_API_URL, { cache: "no-store" })
        ]);

        if (memberResponse.status !== "fulfilled" || !memberResponse.value.ok) {
          throw new Error("members.json 응답 오류");
        }

        const memberData = await memberResponse.value.json();
        const rawMembers = Array.isArray(memberData) ? memberData : (Array.isArray(memberData.members) ? memberData.members : []);
        allMembers = rawMembers.map(normalizeMember).filter(member => member.id);

        if (liveResponse.status === "fulfilled" && liveResponse.value.ok) {
          const liveData = await liveResponse.value.json();
          normalizeLiveData(liveData);
        }

        renderMembers();
      } catch (error) {
        console.error(error);
        totalCount.textContent = "-";
        liveCount.textContent = "-";
        memberContent.innerHTML = `
          <section class="member-section">
            <div class="member-grid"><div class="empty-card">멤버 정보를 불러오지 못했습니다.</div></div>
          </section>
        `;
      }
    }

    renderRankGuide();
    loadMembers();
  </script>
</body>
</html>
