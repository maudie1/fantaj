<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANTAJ 로그인</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabaseClient.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 206, 236, 0.9), transparent 34%),
        radial-gradient(circle at bottom right, rgba(214, 186, 255, 0.85), transparent 38%),
        #fff7ff;
      color: #3d264e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(183, 104, 255, 0.2);
      box-shadow: 0 18px 45px rgba(132, 73, 166, 0.18);
      padding: 34px 28px;
      border-radius: 18px;
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.12em;
      color: #944dc0;
    }

    .brand p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #7a5a8f;
      font-weight: 700;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 800;
      color: #5b3a70;
    }

    .field input {
      width: 100%;
      height: 46px;
      border: 1px solid #e5c8f1;
      background: #fff;
      color: #3d264e;
      padding: 0 13px;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      font-weight: 700;
    }

    .field input:focus {
      border-color: #b96de1;
      box-shadow: 0 0 0 3px rgba(185, 109, 225, 0.16);
    }

    .test-notice {
      margin: 0 0 18px;
      padding: 12px 13px;
      border: 1px solid #ead0f5;
      background: #fbf2ff;
      color: #7a3e9d;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 800;
      text-align: center;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      height: 46px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
    }

    .login-btn {
      background: linear-gradient(135deg, #d95fc8, #8b46d9);
      color: #fff;
    }

    .signup-btn {
      background: #f3e4fb;
      color: #7b35a8;
      border: 1px solid #e0bdf0;
    }

    .home-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #8a4ab4;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .message {
      min-height: 22px;
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #7a5a8f;
      white-space: pre-line;
    }

    .user-box {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #fbf2ff;
      border: 1px solid #ead0f5;
      text-align: center;
    }

    .user-box strong {
      display: block;
      margin-bottom: 10px;
      color: #5b2b78;
      word-break: break-all;
    }

    .logout-btn {
      width: 100%;
      background: #ffffff;
      color: #8a4ab4;
      border: 1px solid #dcb8ef;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .login-wrap {
        padding: 28px 22px;
      }

      .brand h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="brand">
      <h1>FANTAJ</h1>
      <p>테스트 로그인</p>
    </div>

    <div class="test-notice">
      현재 로그인 서비스는 테스트 중입니다.<br />
      신규 회원가입은 임시로 중단되어 있습니다.
    </div>

    <div id="loginForm">
      <div class="field">
        <label for="email">이메일</label>
        <input id="email" type="email" autocomplete="email" placeholder="이메일을 입력해주세요" />
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력해주세요" />
      </div>

      <div class="btn-row">
        <button class="login-btn" type="button" onclick="loginUser()">로그인</button>
      </div>
    </div>

    <div id="userBox" class="user-box">
      <strong id="userEmail"></strong>
      <button class="logout-btn" type="button" onclick="logoutUser()">로그아웃</button>
    </div>

    <div id="message" class="message"></div>

    <a class="home-link" href="/">메인으로 돌아가기</a>
  </div>

  <script>
    const messageEl = document.getElementById("message");
    const loginForm = document.getElementById("loginForm");
    const userBox = document.getElementById("userBox");
    const userEmail = document.getElementById("userEmail");

    function showMessage(text) {
      messageEl.textContent = text;
    }

    async function checkLoginState() {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error || !data.user) {
        loginForm.style.display = "block";
        userBox.style.display = "none";
        return;
      }

      loginForm.style.display = "none";
      userBox.style.display = "block";
      userEmail.textContent = data.user.email;
      showMessage("이미 로그인되어 있습니다.");
    }

    async function signupUser() {
      showMessage("현재 로그인 서비스는 테스트 중입니다.\n신규 회원가입은 임시로 중단되어 있습니다.");
    }

    async function loginUser() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMessage("이메일과 비밀번호를 입력해주세요.");
        return;
      }

      showMessage("로그인 중입니다...");

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage("로그인 실패\n" + error.message);
        return;
      }

      showMessage("로그인 성공!");
      await checkLoginState();

      setTimeout(() => {
        window.location.href = "/";
      }, 700);
    }

    async function logoutUser() {
      await supabaseClient.auth.signOut();
      showMessage("로그아웃되었습니다.");
      loginForm.style.display = "block";
      userBox.style.display = "none";
    }

    checkLoginState();
  </script>
</body>
</html>
