<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANTAJ 로그인</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 206, 236, 0.9), transparent 34%),
        radial-gradient(circle at bottom right, rgba(214, 186, 255, 0.85), transparent 38%),
        #fff7ff;
      color: #3d264e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(183, 104, 255, 0.2);
      box-shadow: 0 18px 45px rgba(132, 73, 166, 0.18);
      padding: 34px 28px;
      border-radius: 12px;
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.12em;
      color: #944dc0;
    }

    .brand p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #7a5a8f;
      font-weight: 700;
    }

    .notice {
      margin: 0 0 18px;
      padding: 12px 13px;
      border: 1px solid #ead0f5;
      background: #fbf2ff;
      color: #7a3e9d;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 800;
      text-align: center;
    }

    .soop-btn,
    .logout-btn {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      font-family: inherit;
    }

    .soop-btn {
      background: #1677ff;
      color: #fff;
      box-shadow: 0 10px 22px rgba(22, 119, 255, 0.18);
    }

    .soop-btn:disabled {
      opacity: 0.62;
      cursor: wait;
    }

    .logout-btn {
      margin-top: 12px;
      background: #ffffff;
      color: #8a4ab4;
      border: 1px solid #dcb8ef;
    }

    .home-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #8a4ab4;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .message {
      min-height: 22px;
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      color: #7a5a8f;
      white-space: pre-line;
      line-height: 1.55;
    }

    .user-box {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #fbf2ff;
      border: 1px solid #ead0f5;
      text-align: center;
    }

    .profile-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      display: none;
      margin: 0 auto 10px;
      border: 3px solid #fff;
      box-shadow: 0 8px 18px rgba(132, 73, 166, 0.16);
      background: #f3e4fb;
    }

    .user-nick {
      display: block;
      color: #5b2b78;
      font-size: 18px;
      font-weight: 950;
      word-break: break-all;
    }

    .user-sub {
      margin-top: 5px;
      color: #8b7199;
      font-size: 12px;
      font-weight: 800;
      word-break: break-all;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .login-wrap {
        padding: 28px 22px;
      }

      .brand h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="brand">
      <h1>FANTAJ</h1>
      <p>SOOP 계정 로그인</p>
    </div>

    <div class="notice">
      SOOP 계정으로 로그인하면<br />
      게시판 글쓰기와 댓글 기능을 사용할 수 있습니다.
    </div>

    <button id="loginButton" class="soop-btn" type="button">SOOP 계정으로 로그인</button>

    <div id="userBox" class="user-box">
      <img id="profileImage" class="profile-img" alt="프로필 이미지">
      <strong id="userNickname" class="user-nick"></strong>
      <div id="userStation" class="user-sub"></div>
      <button class="logout-btn" type="button" id="logoutButton">로그아웃</button>
    </div>

    <div id="message" class="message"></div>

    <a class="home-link" href="/">메인으로 돌아가기</a>
  </div>

  <script>
    const SOOP_CLIENT_ID = "60ac45ee9d24993accc37cd3f3e3aa7c";
    const SOOP_AUTH_WORKER_URL = "https://fantajsoopauth.4rgn2004.workers.dev/login";
    const LOGIN_STORAGE_KEY = "FANTAJ_SOOP_LOGIN_USER";

    const loginButton = document.getElementById("loginButton");
    const logoutButton = document.getElementById("logoutButton");
    const messageEl = document.getElementById("message");
    const userBox = document.getElementById("userBox");
    const userNickname = document.getElementById("userNickname");
    const userStation = document.getElementById("userStation");
    const profileImage = document.getElementById("profileImage");

    function showMessage(text) {
      messageEl.textContent = text || "";
    }

    function saveLoginUser(user) {
      localStorage.setItem(LOGIN_STORAGE_KEY, JSON.stringify({
        ...user,
        loggedInAt: new Date().toISOString()
      }));
    }

    function getSavedLoginUser() {
      try {
        return JSON.parse(localStorage.getItem(LOGIN_STORAGE_KEY) || "null");
      } catch (error) {
        return null;
      }
    }

    function clearLoginUser() {
      localStorage.removeItem(LOGIN_STORAGE_KEY);
    }

    function showLoggedOut() {
      loginButton.style.display = "block";
      userBox.style.display = "none";
      showMessage("");
    }

    function showLoggedIn(user) {
      loginButton.style.display = "none";
      userBox.style.display = "block";

      userNickname.textContent = user.nickname || "SOOP 로그인 사용자";
      userStation.textContent = user.stationName ? `방송국: ${user.stationName}` : "SOOP 로그인 완료";

      if (user.profileImage) {
        profileImage.src = user.profileImage;
        profileImage.style.display = "block";
      } else {
        profileImage.removeAttribute("src");
        profileImage.style.display = "none";
      }

      showMessage("로그인되어 있습니다.");
    }

    function loginWithSoop() {
      const loginUrl = `https://openapi.sooplive.com/auth/code?client_id=${encodeURIComponent(SOOP_CLIENT_ID)}`;
      window.location.href = loginUrl;
    }

    async function handleSoopCallback(code) {
      loginButton.disabled = true;
      loginButton.textContent = "SOOP 로그인 확인 중...";
      showMessage("SOOP 로그인 정보를 확인하고 있습니다...");

      try {
        const response = await fetch(SOOP_AUTH_WORKER_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ code })
        });

        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.message || "SOOP 로그인 처리에 실패했습니다.");
        }

        saveLoginUser(result.user);
        showLoggedIn(result.user);
        showMessage("SOOP 로그인 성공!");

        window.history.replaceState({}, document.title, "/login/");
      } catch (error) {
        console.error(error);
        clearLoginUser();
        showLoggedOut();
        showMessage("로그인 실패\n" + (error.message || error));
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = "SOOP 계정으로 로그인";
      }
    }

    function initLoginPage() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");

      if (code) {
        handleSoopCallback(code);
        return;
      }

      const savedUser = getSavedLoginUser();

      if (savedUser) {
        showLoggedIn(savedUser);
      } else {
        showLoggedOut();
      }
    }

    loginButton.addEventListener("click", loginWithSoop);

    logoutButton.addEventListener("click", () => {
      clearLoginUser();
      showLoggedOut();
      showMessage("로그아웃되었습니다.");
    });

    initLoginPage();
  </script>
</body>
</html>
