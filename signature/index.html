<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FANTAJ SIGNATURE</title>
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text: #3d3148;
    --muted: #7c6d85;
    --line: rgba(226, 194, 223, 0.56);
    --pink: #ff7eb7;
    --purple: #a965e8;
    --deep: #8f4eb2;
    --mint: #25bec1;
    --card: rgba(255, 255, 255, 0.78);
    --soft: rgba(255, 246, 252, 0.82);
    --shadow: 0 18px 42px rgba(150, 94, 171, 0.11);
  }

  body {
    min-height: 100vh;
    font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
    background:
      radial-gradient(circle at 12% 5%, rgba(255, 183, 217, .26), transparent 28%),
      radial-gradient(circle at 86% 12%, rgba(184, 156, 255, .22), transparent 30%),
      linear-gradient(180deg, #fff7fb 0%, #f7f0ff 45%, #fffaf4 100%);
    color: var(--text);
  }

  a { color: inherit; text-decoration: none; }
  button, input { font-family: inherit; }

  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(226, 194, 223, .55);
    box-shadow: 0 8px 28px rgba(177, 122, 174, .12);
  }

  .nav-inner {
    width: min(1180px, calc(100% - 32px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo {
    font-size: 28px;
    font-weight: 950;
    letter-spacing: .12em;
    color: var(--deep);
  }

  .nav-menu {
    display: flex;
    align-items: center;
    gap: 26px;
    font-size: 15px;
    font-weight: 800;
    color: #6b5b75;
  }

  .nav-menu a:hover,
  .nav-menu a.active { color: #b05cc9; }

  .nav-live,
  .members-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 950;
    white-space: nowrap;
  }

  .nav-live {
    padding: 9px 15px;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    box-shadow: 0 8px 20px rgba(177, 92, 201, .24);
  }

  main {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 26px 0 80px;
  }

  .hero {
    position: relative;
    height: 300px;
    border-radius: 10px;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.95), transparent 26%),
      radial-gradient(circle at 85% 22%, rgba(255,214,239,.9), transparent 28%),
      linear-gradient(135deg, #f9d8ee 0%, #e6d9ff 48%, #fff0d8 100%);
    box-shadow: 0 26px 60px rgba(150,94,171,.18);
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 10%, rgba(255,255,255,.5) 48%, transparent 70%),
      radial-gradient(circle at 45% 70%, rgba(255,255,255,.72), transparent 22%);
    opacity: .75;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
  }

  .hero-kicker {
    font-size: 14px;
    font-weight: 900;
    letter-spacing: .28em;
    color: #a061bb;
    margin-bottom: 12px;
  }

  .hero-title {
    font-size: clamp(44px, 7vw, 78px);
    font-weight: 950;
    letter-spacing: .08em;
    color: #fff;
    text-shadow: 0 8px 28px rgba(117,67,151,.26);
  }

  .hero-sub {
    margin-top: 14px;
    font-size: 16px;
    font-weight: 800;
    color: #6f527c;
  }

  .control-panel {
    margin-top: 24px;
    padding: 16px;
    border-radius: 13px;
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(210px, 330px) auto;
    gap: 12px;
    align-items: center;
  }

  .search-input {
    width: 100%;
    border: 1px solid rgba(226,194,223,.72);
    border-radius: 10px;
    background: rgba(255,255,255,.94);
    color: var(--text);
    outline: none;
    padding: 13px 15px;
    font-size: 15px;
    font-weight: 850;
  }

  .search-input:focus {
    border-color: rgba(169,101,232,.75);
    box-shadow: 0 0 0 4px rgba(169,101,232,.12);
  }

  .volume-box {
    height: 47px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,244,251,.85));
    border: 1px solid rgba(236,206,232,.72);
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #b05cc9;
    font-size: 13px;
    font-weight: 950;
  }

  .volume-box input {
    width: 100%;
    min-width: 80px;
    accent-color: var(--pink);
  }

  .members-link {
    height: 47px;
    padding: 0 16px;
    color: #fff;
    background: linear-gradient(135deg, #ff7eb7, #a965e8);
    box-shadow: 0 8px 20px rgba(177, 92, 201, .20);
  }

  .members-link:hover { transform: translateY(-1px); }

  .range-tabs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
  }

  .range-btn {
    min-height: 42px;
    border: 1px solid rgba(226,194,223,.68);
    border-radius: 9px;
    background: rgba(255,255,255,.82);
    color: #765a88;
    font-weight: 950;
    cursor: pointer;
    transition: .14s ease;
  }

  .range-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(150,94,171,.10);
  }

  .range-btn.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 10px 22px rgba(176,97,209,.20);
  }

  .section {
    margin-top: 26px;
  }

  .section-title {
    position: relative;
    width: 100%;
    min-height: 50px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .section-name {
    width: min(280px, 100%);
    min-height: 50px;
    padding: 11px 13px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    text-align: center;
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,241,249,.88));
    border: 1px solid rgba(226,194,223,.68);
    box-shadow: 0 10px 24px rgba(150,94,171,.09);
    color: #8f4eb2;
    font-size: 18px;
    font-weight: 950;
    white-space: nowrap;
  }

  .section-count {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    min-width: 70px;
    padding: 7px 10px;
    border-radius: 8px;
    text-align: center;
    background: rgba(255,255,255,.82);
    border: 1px solid rgba(226,194,223,.58);
    color: #8a4dae;
    font-size: 11px;
    font-weight: 950;
    white-space: nowrap;
    box-shadow: 0 8px 18px rgba(150,94,171,.08);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 12px;
  }

  .sig-card {
    min-width: 0;
    border-radius: 12px;
    background: rgba(255,255,255,.80);
    border: 1px solid rgba(226,194,223,.58);
    box-shadow: 0 12px 30px rgba(150,94,171,.10);
    padding: 8px;
    cursor: pointer;
    overflow: hidden;
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
  }

  .sig-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 32px rgba(150,94,171,.16);
    border-color: rgba(255,126,183,.42);
  }

  .sig-card.playing {
    border-color: rgba(255,126,183,.78);
    box-shadow: 0 0 0 3px rgba(255,126,183,.18), 0 16px 32px rgba(150,94,171,.16);
  }

  .sig-card.loading {
    border-color: rgba(169,101,232,.74);
    box-shadow: 0 0 0 3px rgba(169,101,232,.16), 0 16px 32px rgba(150,94,171,.16);
  }

  .thumb,
  .no-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 9px;
    background: linear-gradient(135deg, #ffe8f5, #efe1ff);
  }

  .thumb {
    display: block;
    object-fit: cover;
  }

  .no-image {
    display: grid;
    place-items: center;
    color: #a061bb;
    font-size: 13px;
    font-weight: 950;
  }

  .sig-info {
    padding: 8px 2px 0;
    text-align: center;
  }

  .sig-number {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    padding: 4px 7px;
    margin: 0 auto 5px;
    background: linear-gradient(135deg, #f7d9ff, #fff1c8);
    color: #8a4dae;
    font-size: 11px;
    font-weight: 950;
    text-align: center;
  }

  .sig-name {
    min-height: 30px;
    color: #4b3659;
    font-size: 13px;
    font-weight: 950;
    line-height: 1.2;
    text-align: center;
    word-break: keep-all;
  }

  .video-btn {
    width: 100%;
    margin-top: 2px;
    border: 1px solid rgba(226,194,223,.66);
    border-radius: 8px;
    padding: 7px 6px;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(243,237,255,.92));
    color: #8655ad;
    font-size: 12px;
    font-weight: 950;
    transition: .14s ease;
  }

  .video-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(150,94,171,.12);
  }

  .video-btn.no-video {
    cursor: default;
    color: #aaa;
    background: #f1edf4;
    box-shadow: none;
  }

  .video-btn.no-video:hover { transform: none; }

  .empty {
    margin-top: 24px;
    padding: 40px 18px;
    border-radius: 13px;
    text-align: center;
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
    color: #8a7893;
    font-weight: 950;
  }

  .video-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(30,20,45,.42);
    backdrop-filter: blur(6px);
  }

  .video-modal.active { display: flex; }

  .video-modal-box {
    width: min(880px, 96vw);
    max-height: 86vh;
    overflow: auto;
    border-radius: 13px;
    background: #fff;
    border: 1px solid rgba(255,183,217,.65);
    box-shadow: 0 20px 55px rgba(40,30,70,.28);
  }

  .video-modal-head {
    position: sticky;
    top: 0;
    z-index: 1;
    padding: 7px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(226,194,223,.55);
  }

  .video-modal-title {
    min-width: 0;
    font-size: 14px;
    font-weight: 950;
    color: #4b3659;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .video-close {
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    font-size: 18px;
    font-weight: 950;
    line-height: 1;
  }

  .video-player-wrap {
    margin: 16px;
    border-radius: 10px;
    overflow: hidden;
    background: #111;
    aspect-ratio: 16 / 9;
  }

  .video-frame {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .video-list {
    padding: 0 16px 16px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  .video-link {
    min-width: 0;
    border: 1px solid rgba(226,194,223,.68);
    border-radius: 8px;
    padding: 9px 10px;
    text-align: center;
    cursor: pointer;
    background: rgba(255,246,252,.82);
    color: #5b4668;
    font-size: 12px;
    font-weight: 950;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .video-link.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--pink), var(--purple));
  }

  @media (max-width: 900px) {
    .nav-menu { display: none; }
    .hero { height: 240px; }
    .control-panel { grid-template-columns: 1fr; }
    .range-tabs { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .video-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 560px) {
    .navbar { height: 66px; }
    .logo { font-size: 23px; }
    main { width: min(100% - 20px, 1180px); padding-top: 18px; }
    .hero { height: 170px; }
    .hero-kicker { font-size: 10px; letter-spacing: .16em; }
    .hero-title { font-size: 38px; }
    .hero-sub { font-size: 12px; }
    .control-panel { margin-top: 16px; padding: 10px; gap: 8px; }
    .search-input, .members-link, .volume-box { height: 40px; font-size: 12px; }
    .range-tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; }
    .range-btn { min-height: 36px; font-size: 11px; }
    .section { margin-top: 18px; }
    .section-title { min-height: 42px; }
    .section-name { width: min(210px, 100%); min-height: 42px; padding: 9px 10px; font-size: 15px; }
    .section-count { font-size: 10px; min-width: 54px; padding: 5px 6px; }
    .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .sig-card { padding: 5px; border-radius: 9px; }
    .thumb, .no-image { border-radius: 7px; }
    .no-image { font-size: 10px; }
    .sig-info { padding-top: 5px; }
    .sig-number { font-size: 9px; padding: 3px 5px; margin-bottom: 3px; }
    .sig-name { min-height: 24px; font-size: 10px; line-height: 1.12; }
    .video-btn { margin-top: 2px; padding: 5px 3px; font-size: 9px; border-radius: 6px; }
    .video-modal-head { padding: 5px 10px; }
    .video-modal-title { font-size: 12px; }
    .video-close { width: 24px; height: 24px; font-size: 15px; }
  }
</style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="../">FANTAJ</a>
      <nav class="nav-menu" aria-label="상단 메뉴">
        <a href="../live/">LIVE</a>
        <a href="../members/">MEMBER</a>
        <a href="../notice/">NOTICE</a>
        <a href="../ranking/">RANKING</a>
        <a href="../play/">PLAY</a>
        <a class="active" href="./">SIGNATURE</a>
      </nav>
      <a class="nav-live" id="onAirButton" href="../live/">ON AIR</a>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="시그니처 배너">
      <div class="hero-content">
        <div class="hero-kicker">FANTAJ OFFICIAL FAN PORTAL</div>
        <h1 class="hero-title">SIGNATURE</h1>
        <p class="hero-sub">NUMBER SEARCH · AUDIO PLAY · VIDEO LIST</p>
      </div>
    </section>

    <section class="control-panel" aria-label="시그니처 검색 및 볼륨">
      <input id="searchInput" class="search-input" type="text" placeholder="번호 또는 이름 검색">
      <div class="volume-box">
        <span>VOLUME</span>
        <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.5">
        <span id="volumeText">50%</span>
      </div>
      <a class="members-link" href="https://fantaj.kr/members">MEMBERS</a>
    </section>

    <section class="range-tabs" id="rangeTabs" aria-label="구간 선택"></section>

    <div id="content"></div>
  </main>

  <div id="videoModal" class="video-modal" aria-hidden="true">
    <div class="video-modal-box" role="dialog" aria-modal="true" aria-labelledby="videoModalTitle">
      <div class="video-modal-head">
        <div id="videoModalTitle" class="video-modal-title">영상 목록</div>
        <button id="videoClose" class="video-close" type="button" aria-label="닫기">×</button>
      </div>
      <div class="video-player-wrap">
        <iframe id="videoFrame" class="video-frame" src="" allowfullscreen loading="lazy"></iframe>
      </div>
      <div id="videoList" class="video-list"></div>
    </div>
  </div>

  <audio id="player" playsinline preload="none"></audio>

<script>
const API_URL = "../data.json";

const ranges = [
  { key: "all", title: "전체", min: 0, max: Infinity },
  { key: "1000", title: "1~1999", min: 1, max: 1999 },
  { key: "2000", title: "2000~2999", min: 2000, max: 2999 },
  { key: "3000", title: "3000~4999", min: 3000, max: 4999 },
  { key: "5000", title: "5000~9999", min: 5000, max: 9999 },
  { key: "10000", title: "10000~300000", min: 10000, max: 300000 }
];

let allData = [];
let currentRange = "all";
let currentUrl = "";
let currentCard = null;
let volume = 0.5;

const player = document.getElementById("player");
const content = document.getElementById("content");
const searchInput = document.getElementById("searchInput");
const volumeControl = document.getElementById("volumeControl");
const volumeText = document.getElementById("volumeText");
const rangeTabs = document.getElementById("rangeTabs");
const videoModal = document.getElementById("videoModal");
const videoModalTitle = document.getElementById("videoModalTitle");
const videoList = document.getElementById("videoList");
const videoFrame = document.getElementById("videoFrame");
const videoClose = document.getElementById("videoClose");

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getFileName(url) {
  if (!url) return "";
  try {
    return decodeURIComponent(String(url).split("/").pop().split("?")[0]);
  } catch {
    return String(url).split("/").pop().split("?")[0];
  }
}

function getImageCandidates(url) {
  if (!url) return [];

  const fileName = getFileName(url);
  const baseName = fileName.replace(/\.(png|jpg|jpeg|gif|webp)$/i, "");
  const originalUrl = String(url);
  const cleanUrl = originalUrl.split("?")[0].toLowerCase();

  if (cleanUrl.endsWith(".gif")) {
    return [
      originalUrl,
      fileName ? `../images/${fileName}` : "",
      baseName ? `../images/${baseName}.webp` : ""
    ].filter(Boolean);
  }

  return [
    baseName ? `../images/${baseName}.webp` : "",
    fileName ? `../images/${fileName}` : "",
    originalUrl
  ].filter(Boolean);
}

function applyImageWithFallback(img, candidates, fallbackText) {
  let index = 0;

  function tryNext() {
    if (index >= candidates.length) {
      const noImage = document.createElement("div");
      noImage.className = "no-image";
      noImage.textContent = fallbackText || "이미지 없음";
      img.replaceWith(noImage);
      return;
    }

    img.src = candidates[index];
    index += 1;
  }

  img.onerror = tryNext;
  tryNext();
}

function createTabs() {
  rangeTabs.innerHTML = "";

  ranges.forEach(range => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "range-btn";
    button.textContent = range.title;

    if (range.key === currentRange) {
      button.classList.add("active");
    }

    button.addEventListener("click", () => {
      currentRange = range.key;
      createTabs();
      render();
    });

    rangeTabs.appendChild(button);
  });
}

function getFilteredData() {
  const keyword = searchInput.value.trim().toLowerCase();
  const activeRange = ranges.find(range => range.key === currentRange) || ranges[0];

  return allData.filter(item => {
    const number = Number(item.number) || 0;
    const inRange = number >= activeRange.min && number <= activeRange.max;
    const matched = !keyword || `${item.number} ${item.name || ""}`.toLowerCase().includes(keyword);
    return inRange && matched;
  });
}

function render() {
  const data = getFilteredData();

  if (!data.length) {
    content.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  const groups = currentRange === "all" ? ranges.filter(range => range.key !== "all") : [ranges.find(range => range.key === currentRange)];
  content.innerHTML = "";

  groups.forEach(group => {
    if (!group) return;

    const items = data.filter(item => {
      const number = Number(item.number) || 0;
      return number >= group.min && number <= group.max;
    });

    if (!items.length) return;

    const section = document.createElement("section");
    section.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = `
      <div class="section-name">${escapeHtml(group.title)}</div>
      <div class="section-count">${items.length}개</div>
    `;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => grid.appendChild(createCard(item)));

    section.appendChild(title);
    section.appendChild(grid);
    content.appendChild(section);
  });
}

function createCard(item) {
  const card = document.createElement("article");
  card.className = "sig-card";

  const imageCandidates = getImageCandidates(item.image);

  if (imageCandidates.length) {
    const img = document.createElement("img");
    img.className = "thumb";
    img.alt = item.name || String(item.number || "");
    img.loading = "lazy";
    img.decoding = "async";
    applyImageWithFallback(img, imageCandidates, "이미지 없음");
    card.appendChild(img);
  } else {
    const noImage = document.createElement("div");
    noImage.className = "no-image";
    noImage.textContent = "이미지 없음";
    card.appendChild(noImage);
  }

  const info = document.createElement("div");
  info.className = "sig-info";

  const number = document.createElement("div");
  number.className = "sig-number";
  number.textContent = `${item.number || "-"}개`;

  const name = document.createElement("div");
  name.className = "sig-name";
  name.textContent = item.name || "이름 없음";

  const videos = Array.isArray(item.videos) ? item.videos.filter(video => video && video.url) : [];
  const videoBtn = document.createElement("button");
  videoBtn.type = "button";
  videoBtn.className = videos.length ? "video-btn" : "video-btn no-video";
  videoBtn.textContent = videos.length ? `영상 ${videos.length}개` : "영상 없음";

  videoBtn.addEventListener("click", event => {
    event.stopPropagation();
    if (!videos.length) return;
    openVideoModal(item, videos);
  });

  info.appendChild(number);
  info.appendChild(name);
  info.appendChild(videoBtn);

  card.appendChild(info);

  card.addEventListener("click", () => {
    playAudio(item.audio || "", card);
  });

  return card;
}

function openVideoModal(item, videos) {
  stopAudio();

  videoModalTitle.textContent = `${item.number || ""} ${item.name || ""} 영상 목록`;
  videoList.innerHTML = "";

  const firstVideo = videos[0];
  videoFrame.src = firstVideo.url;

  videos.forEach((video, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "video-link";
    button.textContent = video.title || `영상 ${index + 1}`;

    if (index === 0) {
      button.classList.add("active");
    }

    button.addEventListener("click", () => {
      videoFrame.src = video.url;
      videoList.querySelectorAll(".video-link").forEach(link => link.classList.remove("active"));
      button.classList.add("active");
    });

    videoList.appendChild(button);
  });

  videoModal.classList.add("active");
  videoModal.setAttribute("aria-hidden", "false");
}

function closeVideoModal() {
  videoModal.classList.remove("active");
  videoModal.setAttribute("aria-hidden", "true");
  videoFrame.src = "";
  videoList.innerHTML = "";
}

function playAudio(url, card) {
  if (!url) return;

  if (currentUrl === url && !player.paused) {
    stopAudio();
    return;
  }

  stopAudio();

  currentUrl = url;
  currentCard = card;
  currentCard.classList.add("loading");

  player.src = url;
  player.volume = volume;
  player.load();

  player.play().catch(() => {
    stopAudio();
  });
}

function setPlayingState() {
  if (!currentCard) return;
  currentCard.classList.remove("loading");
  currentCard.classList.add("playing");
}

function stopAudio() {
  player.pause();
  player.removeAttribute("src");
  player.load();

  if (currentCard) {
    currentCard.classList.remove("playing");
    currentCard.classList.remove("loading");
  }

  currentUrl = "";
  currentCard = null;
}

volumeControl.addEventListener("input", event => {
  volume = Number(event.target.value);
  volumeText.textContent = Math.round(volume * 100) + "%";
  player.volume = volume;
});

searchInput.addEventListener("input", render);
videoClose.addEventListener("click", closeVideoModal);
videoModal.addEventListener("click", event => {
  if (event.target === videoModal) closeVideoModal();
});
document.addEventListener("keydown", event => {
  if (event.key === "Escape" && videoModal.classList.contains("active")) closeVideoModal();
});

player.addEventListener("playing", setPlayingState);
player.addEventListener("ended", stopAudio);
player.addEventListener("error", stopAudio);

async function init() {
  try {
    const response = await fetch(API_URL, { cache: "no-store" });
    if (!response.ok) throw new Error("data.json 응답 오류");

    const data = await response.json();
    allData = Array.isArray(data) ? data : [];
    allData.sort((a, b) => Number(a.number || 0) - Number(b.number || 0));

    createTabs();
    render();
  } catch (error) {
    console.error(error);
    content.innerHTML = `<div class="empty">시그니처 데이터를 불러오지 못했습니다.</div>`;
  }
}

init();
</script>
<script>
const LIVE_API_URL_FOR_ON_AIR = "https://fantj-live.4rgn2004.workers.dev/";

async function updateOnAirCount() {
  const onAirButton = document.getElementById("onAirButton");
  if (!onAirButton) return;

  try {
    const response = await fetch(LIVE_API_URL_FOR_ON_AIR, { cache: "no-store" });
    if (!response.ok) throw new Error("LIVE API 응답 오류");

    const data = await response.json();
    const members = Array.isArray(data.members) ? data.members : [];
    const liveCount = members.filter(member => member && member.isLive).length;

    onAirButton.textContent = liveCount > 0 ? `ON AIR ${liveCount}` : "ON AIR";
  } catch (error) {
    console.error(error);
    onAirButton.textContent = "ON AIR";
  }
}

updateOnAirCount();
setInterval(updateOnAirCount, 60000);
</script>
