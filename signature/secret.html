<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시그 작업 페이지</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #ffe8f1, #f3e7ff);
      color: #4a2b3f;
    }

    header {
      padding: 28px 16px 16px;
      text-align: center;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 32px;
      color: #d65a9e;
    }

    .top-bar {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      padding: 0 8px;
    }

    #searchInput {
      width: 100%;
      max-width: 420px;
      padding: 12px 16px;
      border: 2px solid #f3a6cc;
      border-radius: 999px;
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.9);
      color: #5a3850;
    }

    #searchInput:focus {
      border-color: #d65a9e;
    }

    .range-tabs {
      max-width: 1200px;
      margin: 18px auto 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
    }

    .range-btn {
      border: none;
      padding: 9px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,0.85);
      color: #b84d8b;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #f0b4d3;
    }

    .range-btn.active {
      background: #d65a9e;
      color: white;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 12px 80px;
    }

    .section-title {
      margin: 26px 6px 14px;
      font-size: 22px;
      color: #b84d8b;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
gap: 12px;
    }

    .card {
      background: rgba(255,255,255,0.9);
border-radius: 14px;
padding: 9px;
      box-shadow: 0 8px 18px rgba(180, 80, 140, 0.16);
      border: 1px solid rgba(255,255,255,0.8);
      text-align: center;
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 14px;
      background: #f8ddeb;
      display: block;
    }

    .no-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      background: #f8ddeb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b66b97;
      font-weight: 700;
      font-size: 14px;
    }

    .name {
      margin-top: 10px;
      font-weight: 800;
      font-size: 15px;
      line-height: 1.25;
      min-height: 22px;
      word-break: keep-all;
    }

    .number {
      margin-top: 4px;
      font-size: 13px;
      color: #9c6b8b;
      font-weight: 700;
    }

    .copy-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .copy-btn {
      flex: 1;
      border: none;
      border-radius: 10px;
      padding: 8px 0;
      background: #f5c2db;
      color: #7e315e;
      font-weight: 900;
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.08s, background 0.4s;
    }

.disabled-btn {
  background: #e7dce4 !important;
  color: #a08b99 !important;
  cursor: default;
  opacity: .75;
}

    .copy-btn:active,
    .copy-btn.copied {
      background: #d65a9e;
      color: white;
      transform: scale(0.96);
    }

    .exit-btn {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      text-decoration: none;
      background: rgba(255,255,255,0.92);
      color: #b84d8b;
      border: 1px solid #f0a9cf;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      box-shadow: 0 8px 20px rgba(180, 80, 140, 0.22);
      backdrop-filter: blur(8px);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #9c6b8b;
      font-weight: 800;
    }

    @media (max-width: 600px) {
      h1 { font-size: 25px; }

      .top-bar {
        justify-content: center;
      }

      #searchInput {
        max-width: 320px;
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .card {
        padding: 7px;
        border-radius: 13px;
      }

      .thumb,
      .no-image {
        border-radius: 10px;
      }

      .name {
        font-size: 11px;
        min-height: 30px;
      }

      .number {
        font-size: 10px;
      }

      .copy-btn {
        font-size: 10px;
        padding: 6px 0;
        border-radius: 7px;
      }

      .exit-btn {
        right: 12px;
        bottom: 12px;
        padding: 10px 14px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>시그 작업 페이지</h1>

    <div class="top-bar">
      <input id="searchInput" type="text" placeholder="번호 또는 이름 검색" />
    </div>

    <div class="range-tabs" id="rangeTabs"></div>
  </header>

  <main id="content"></main>

  <a href="/signature/" class="exit-btn">← 시그목록</a>

  <script>

    const DATA_URL = "/data.json";
    const IMAGE_FOLDER = "/images/";

    const ranges = [
      { key: "all", label: "전체", min: 0, max: Infinity },
      { key: "1000", label: "1~1999", min: 1, max: 1999 },
      { key: "2000", label: "2000~2999", min: 2000, max: 2999 },
      { key: "3000", label: "3000~4999", min: 3000, max: 4999 },
      { key: "5000", label: "5000~9999", min: 5000, max: 9999 },
      { key: "10000", label: "10000~300000", min: 10000, max: 300000 }
    ];

    let allData = [];
    let currentRange = "all";

    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");
    const rangeTabs = document.getElementById("rangeTabs");

    function getLocalWebpFromOriginal(url) {
      if (!url) return "";
      try {
        const fileName = decodeURIComponent(url.split("/").pop().split("?")[0]);
        const baseName = fileName.replace(/\.(png|jpg|jpeg|gif|webp)$/i, "");
        return IMAGE_FOLDER + baseName + ".webp";
      } catch {
        return "";
      }
    }

    async function copyText(text, button) {
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }

      button.classList.add("copied");
      setTimeout(() => {
        button.classList.remove("copied");
      }, 400);
    }

    function createTabs() {
      rangeTabs.innerHTML = "";

      ranges.forEach(range => {
        const btn = document.createElement("button");
        btn.className = "range-btn";
        btn.textContent = range.label;

        if (range.key === currentRange) {
          btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
          currentRange = range.key;
          createTabs();
          render();
        });

        rangeTabs.appendChild(btn);
      });
    }

    function getFilteredData() {
      const keyword = searchInput.value.trim().toLowerCase();
      const range = ranges.find(r => r.key === currentRange);

      return allData.filter(item => {
        const number = Number(item.number) || 0;
        const inRange = number >= range.min && number <= range.max;

        const text = `${item.number} ${item.name}`.toLowerCase();
        const matched = !keyword || text.includes(keyword);

        return inRange && matched;
      });
    }

    function render() {
      const data = getFilteredData();

      if (!data.length) {
        content.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
        return;
      }

      const grid = document.createElement("div");
      grid.className = "grid";

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const localImage = getLocalWebpFromOriginal(item.image);

        const imgWrap = document.createElement("div");

        if (localImage) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.src = localImage;
          img.alt = item.name || "";
          img.loading = "lazy";

          img.onerror = () => {
            img.replaceWith(createNoImage());
          };

          imgWrap.appendChild(img);
        } else {
          imgWrap.appendChild(createNoImage());
        }

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.name || "이름 없음";

        const number = document.createElement("div");
        number.className = "number";
        number.textContent = `${item.number}개`;

        const copyRow = document.createElement("div");
        copyRow.className = "copy-row";

        const audioBtn = document.createElement("button");
audioBtn.className = "copy-btn";

if (item.audio) {
  audioBtn.textContent = "음원";

  audioBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    copyText(item.audio, audioBtn);
  });

} else {
  audioBtn.textContent = "음원";
  audioBtn.classList.add("disabled-btn");
  audioBtn.disabled = true;
}

const imageBtn = document.createElement("button");
imageBtn.className = "copy-btn";

if (item.image) {
  imageBtn.textContent = "이미지";

  imageBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    copyText(item.image, imageBtn);
  });

} else {
  imageBtn.textContent = "이미지";
  imageBtn.classList.add("disabled-btn");
  imageBtn.disabled = true;
}

        copyRow.appendChild(audioBtn);
        copyRow.appendChild(imageBtn);

        card.appendChild(imgWrap);
        card.appendChild(name);
        card.appendChild(number);
        card.appendChild(copyRow);

        grid.appendChild(card);
      });

      content.innerHTML = "";
      content.appendChild(grid);
    }

    function createNoImage() {
      const div = document.createElement("div");
      div.className = "no-image";
      div.textContent = "이미지 없음";
      return div;
    }

    async function init() {
      try {
        const res = await fetch(DATA_URL, { cache: "no-store" });
        allData = await res.json();

        allData.sort((a, b) => Number(a.number) - Number(b.number));

        createTabs();
        render();
      } catch (err) {
        content.innerHTML = `<div class="empty">data.json을 불러오지 못했습니다.</div>`;
        console.error(err);
      }
    }

    searchInput.addEventListener("input", render);

    init();
  </script>
</body>
</html>
