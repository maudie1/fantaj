<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FANTAJ MEMBERS</title>
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --text: #3d3148;
    --muted: #7c6d85;
    --line: rgba(226, 194, 223, 0.56);
    --pink: #ff7eb7;
    --purple: #a965e8;
    --deep: #8f4eb2;
    --card: rgba(255, 255, 255, 0.78);
    --shadow: 0 18px 42px rgba(150, 94, 171, 0.11);
  }

  body {
    min-height: 100vh;
    font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
    background:
      radial-gradient(circle at 12% 5%, rgba(255, 183, 217, .26), transparent 28%),
      radial-gradient(circle at 86% 12%, rgba(184, 156, 255, .22), transparent 30%),
      linear-gradient(180deg, #fff7fb 0%, #f7f0ff 45%, #fffaf4 100%);
    color: var(--text);
  }

  a { color: inherit; text-decoration: none; }
  button, input { font-family: inherit; }

  .navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.72);
    backdrop-filter: blur(18px);
    border-bottom: 1px solid rgba(226,194,223,.55);
    box-shadow: 0 8px 28px rgba(177,122,174,.12);
  }

  .nav-inner {
    width: min(1180px, calc(100% - 32px));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo {
    font-size: 28px;
    font-weight: 950;
    letter-spacing: .12em;
    color: var(--deep);
  }

  .back-link {
    padding: 9px 15px;
    border-radius: 10px;
    color: #fff;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    font-size: 13px;
    font-weight: 950;
    box-shadow: 0 8px 20px rgba(177,92,201,.24);
    white-space: nowrap;
  }

  main {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 26px 0 80px;
  }

  .hero {
    position: relative;
    min-height: 220px;
    border-radius: 10px;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.95), transparent 26%),
      radial-gradient(circle at 85% 22%, rgba(255,214,239,.9), transparent 28%),
      linear-gradient(135deg, #f9d8ee 0%, #e6d9ff 48%, #fff0d8 100%);
    box-shadow: 0 26px 60px rgba(150,94,171,.18);
    display: grid;
    place-items: center;
    text-align: center;
    padding: 30px;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 10%, rgba(255,255,255,.5) 48%, transparent 70%),
      radial-gradient(circle at 45% 70%, rgba(255,255,255,.72), transparent 22%);
    opacity: .75;
  }

  .hero-content {
    position: relative;
    z-index: 1;
  }

  .hero-kicker {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .26em;
    color: #a061bb;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(38px, 6vw, 68px);
    font-weight: 950;
    letter-spacing: .08em;
    color: #fff;
    text-shadow: 0 8px 28px rgba(117,67,151,.26);
  }

  .hero-sub {
    margin-top: 12px;
    font-size: 15px;
    font-weight: 850;
    color: #6f527c;
  }

  .top-panel {
    margin-top: 22px;
    padding: 16px;
    border-radius: 13px;
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: minmax(220px, 1fr) auto auto;
    gap: 10px;
    align-items: center;
  }

  #searchInput {
    width: 100%;
    border: 1px solid rgba(226,194,223,.72);
    border-radius: 10px;
    background: rgba(255,255,255,.94);
    color: var(--text);
    outline: none;
    padding: 13px 15px;
    font-size: 15px;
    font-weight: 850;
  }

  #searchInput:focus {
    border-color: rgba(169,101,232,.75);
    box-shadow: 0 0 0 4px rgba(169,101,232,.12);
  }

  .guide,
  .sort-btn {
    min-height: 45px;
    padding: 0 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 950;
    white-space: nowrap;
  }

  .guide {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #8a5ea8;
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,244,251,.85));
    border: 1px solid rgba(236,206,232,.72);
  }

  .sort-btn {
    border: 1px solid rgba(226,194,223,.68);
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(243,237,255,.92));
    color: #8655ad;
    cursor: pointer;
    transition: .14s ease;
  }

  .sort-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(150,94,171,.10);
  }

  .sort-btn.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 10px 22px rgba(176,97,209,.20);
  }

  .range-tabs {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
  }

  .range-btn {
    min-height: 42px;
    border: 1px solid rgba(226,194,223,.68);
    border-radius: 9px;
    background: rgba(255,255,255,.82);
    color: #765a88;
    font-weight: 950;
    cursor: pointer;
    transition: .14s ease;
  }

  .range-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(150,94,171,.10);
  }

  .range-btn.active {
    color: #fff;
    border-color: transparent;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    box-shadow: 0 10px 22px rgba(176,97,209,.20);
  }

  #content {
    margin-top: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 10px;
  }

  .card {
    min-width: 0;
    border-radius: 11px;
    background: rgba(255,255,255,.80);
    border: 1px solid rgba(226,194,223,.58);
    box-shadow: 0 10px 24px rgba(150,94,171,.09);
    padding: 7px;
    text-align: center;
    overflow: hidden;
  }

  .thumb,
  .no-image {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    background: linear-gradient(135deg, #ffe8f5, #efe1ff);
  }

  .thumb {
    display: block;
    object-fit: cover;
  }

  .no-image {
    display: grid;
    place-items: center;
    color: #a061bb;
    font-size: 13px;
    font-weight: 950;
  }

  .name {
    min-height: 28px;
    margin-top: 7px;
    color: #4b3659;
    font-size: 12px;
    font-weight: 950;
    line-height: 1.25;
    word-break: keep-all;
  }

  .number {
    display: inline-flex;
    margin-top: 5px;
    border-radius: 7px;
    padding: 4px 6px;
    background: linear-gradient(135deg, #f7d9ff, #fff1c8);
    color: #8a4dae;
    font-size: 10px;
    font-weight: 950;
  }

  .copy-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-top: 7px;
  }

  .copy-btn {
    border: 1px solid rgba(226,194,223,.66);
    border-radius: 7px;
    padding: 6px 3px;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(243,237,255,.92));
    color: #8655ad;
    font-size: 11px;
    font-weight: 950;
    transition: .14s ease;
  }

  .copy-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(150,94,171,.12);
  }

  .copy-btn.copied {
    color: #fff;
    background: linear-gradient(135deg, var(--pink), var(--purple));
  }

  .copy-btn.disabled-btn {
    cursor: default;
    color: #aaa;
    background: #f1edf4;
    box-shadow: none;
  }

  .copy-btn.disabled-btn:hover { transform: none; }

  .empty {
    padding: 40px 18px;
    border-radius: 13px;
    text-align: center;
    background: rgba(255,255,255,.78);
    border: 1px solid var(--line);
    color: #8a7893;
    font-weight: 950;
  }
  @media (max-width: 900px) {
    .navbar {
      height: auto;
      min-height: 66px;
      padding: 10px 0;
    }

    .nav-inner {
      width: min(100% - 20px, 1180px);
      gap: 10px;
    }

    .logo {
      font-size: 24px;
      letter-spacing: .10em;
    }

    .back-link {
      padding: 8px 12px;
      border-radius: 9px;
      font-size: 12px;
    }

    main {
      width: min(100% - 20px, 1180px);
      padding: 18px 0 60px;
    }

    .hero {
      min-height: 170px;
      padding: 22px;
      border-radius: 10px;
    }

    .hero-kicker {
      font-size: 11px;
      letter-spacing: .18em;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 38px;
    }

    .hero-sub {
      margin-top: 8px;
      font-size: 13px;
    }

    .top-panel {
      margin-top: 16px;
      padding: 11px;
      grid-template-columns: 1fr;
      gap: 8px;
      border-radius: 11px;
    }

    .range-tabs {
      margin-top: 10px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    #content {
      margin-top: 16px;
    }
  }

  @media (max-width: 560px) {
    .navbar {
      min-height: 58px;
      padding: 8px 0;
    }

    .nav-inner {
      width: min(100% - 16px, 1180px);
      gap: 8px;
    }

    .logo {
      font-size: 21px;
      letter-spacing: .09em;
    }

    .back-link {
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 11px;
    }

    main {
      width: min(100% - 16px, 1180px);
      padding-top: 14px;
      padding-bottom: 44px;
    }

    .hero {
      min-height: 118px;
      padding: 16px 12px;
      border-radius: 9px;
    }

    .hero-kicker {
      font-size: 9px;
      letter-spacing: .12em;
      margin-bottom: 5px;
    }

    h1 {
      font-size: 30px;
      letter-spacing: .06em;
    }

    .hero-sub {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.35;
    }

    .top-panel {
      margin-top: 12px;
      padding: 8px;
      gap: 6px;
      border-radius: 10px;
      grid-template-columns: 1fr 1fr;
    }

    #searchInput {
      grid-column: 1 / -1;
    }

    #searchInput,
    .guide,
    .sort-btn {
      min-height: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 11px;
      padding: 7px 9px;
    }

    .guide {
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .range-tabs {
      margin-top: 7px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 5px;
    }

    .range-btn {
      min-height: 28px;
      border-radius: 7px;
      font-size: 9px;
      line-height: 1.15;
      padding: 3px 2px;
    }

    #content {
      margin-top: 14px;
    }

    .grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }

    .card {
      padding: 4px;
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(150,94,171,.07);
    }

    .thumb,
    .no-image {
      border-radius: 6px;
    }

    .no-image {
      font-size: 9px;
    }

    .name {
      min-height: 24px;
      margin-top: 5px;
      font-size: 9px;
      line-height: 1.12;
    }

    .number {
      margin-top: 3px;
      padding: 2px 4px;
      border-radius: 6px;
      font-size: 8px;
    }

    .copy-row {
      gap: 3px;
      margin-top: 5px;
    }

    .copy-btn {
      padding: 4px 1px;
      border-radius: 5px;
      font-size: 8px;
    }

    .empty {
      padding: 28px 14px;
      border-radius: 10px;
      font-size: 13px;
    }
  }

  @media (max-width: 420px) {
    .grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .range-btn {
      font-size: 9px;
    }
  }

</style>
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="logo" href="../">FANTAJ</a>
      <a href="./" class="back-link">시그목록</a>
    </div>
  </header>

  <main>
    <section class="hero" aria-label="멤버 시그 작업 페이지">
      <div class="hero-content">
        <div class="hero-kicker">FANTAJ PRIVATE SIGNATURE</div>
        <h1>MEMBERS</h1>
        <p class="hero-sub">음원 · 이미지 링크 복사 전용 페이지</p>
      </div>
    </section>

    <section class="top-panel">
      <input id="searchInput" type="text" placeholder="번호 또는 이름 검색" />
      <div class="guide">버튼을 누르면 링크가 복사됩니다</div>
      <button id="bjSortBtn" class="sort-btn" type="button">개인 방송</button>
    </section>

    <section class="range-tabs" id="rangeTabs"></section>

    <main id="content"></main>
  </main>

<script>
const DATA_URL = "../data.json";
const IMAGE_FOLDER = "../images/";

const ranges = [
  { key: "all", label: "전체", min: 0, max: Infinity },
  { key: "1000", label: "1~1999", min: 1, max: 1999 },
  { key: "2000", label: "2000~2999", min: 2000, max: 2999 },
  { key: "3000", label: "3000~4999", min: 3000, max: 4999 },
  { key: "5000", label: "5000~9999", min: 5000, max: 9999 },
  { key: "10000", label: "10000~300000", min: 10000, max: 300000 }
];

let allData = [];
let currentRange = "all";
let sortMode = "number";

const content = document.getElementById("content");
const searchInput = document.getElementById("searchInput");
const rangeTabs = document.getElementById("rangeTabs");
const bjSortBtn = document.getElementById("bjSortBtn");

function getFileName(url) {
  if (!url) return "";
  try {
    return decodeURIComponent(String(url).split("/").pop().split("?")[0]);
  } catch {
    return String(url).split("/").pop().split("?")[0];
  }
}

function getImageCandidates(url) {
  if (!url) return [];
  const fileName = getFileName(url);
  const baseName = fileName.replace(/\.(png|jpg|jpeg|gif|webp)$/i, "");
  return baseName ? [IMAGE_FOLDER + baseName + ".webp"] : [];
}

function applyImageWithFallback(img, candidates) {
  let index = 0;

  function tryNext() {
    if (index >= candidates.length) {
      img.replaceWith(createNoImage());
      return;
    }

    img.src = candidates[index];
    index += 1;
  }

  img.onerror = tryNext;
  tryNext();
}

function createNoImage() {
  const div = document.createElement("div");
  div.className = "no-image";
  div.textContent = "이미지 없음";
  return div;
}

async function copyText(text, button) {
  if (!text) return;

  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    temp.remove();
  }

  button.classList.add("copied");
  setTimeout(() => {
    button.classList.remove("copied");
  }, 500);
}

function createTabs() {
  rangeTabs.innerHTML = "";

  ranges.forEach(range => {
    const btn = document.createElement("button");
    btn.className = "range-btn";
    btn.type = "button";
    btn.textContent = range.label;

    if (range.key === currentRange) {
      btn.classList.add("active");
    }

    btn.addEventListener("click", () => {
      currentRange = range.key;
      createTabs();
      render();
    });

    rangeTabs.appendChild(btn);
  });
}

function getFilteredData() {
  const keyword = searchInput.value.trim().toLowerCase();
  const range = ranges.find(r => r.key === currentRange) || ranges[0];

  const filtered = allData.filter(item => {
    const number = Number(item.number) || 0;
    const inRange = number >= range.min && number <= range.max;
    const text = `${item.number} ${item.name || ""} ${item.bj || ""}`.toLowerCase();
    const matched = !keyword || text.includes(keyword);
    return inRange && matched;
  });

  return filtered.sort((a, b) => {
    if (sortMode === "bj") {
      const aHasBj = a.bj !== undefined && a.bj !== null && a.bj !== "" && !Number.isNaN(Number(a.bj));
      const bHasBj = b.bj !== undefined && b.bj !== null && b.bj !== "" && !Number.isNaN(Number(b.bj));

      if (aHasBj !== bHasBj) return aHasBj ? -1 : 1;
      if (aHasBj && bHasBj) {
        const bjDiff = Number(a.bj) - Number(b.bj);
        if (bjDiff !== 0) return bjDiff;
      }
    }

    return Number(a.number || 0) - Number(b.number || 0);
  });
}

function render() {
  const data = getFilteredData();

  if (!data.length) {
    content.innerHTML = `<div class="empty">검색 결과가 없습니다.</div>`;
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  data.forEach(item => {
    const card = document.createElement("article");
    card.className = "card";

    const imageCandidates = getImageCandidates(item.image);

    if (!item.image || !imageCandidates.length) {
      card.appendChild(createNoImage());
    } else {
      const img = document.createElement("img");
      img.className = "thumb";
      img.alt = item.name || "";
      img.loading = "lazy";
      applyImageWithFallback(img, imageCandidates);
      card.appendChild(img);
    }

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = item.name || "이름 없음";

    const number = document.createElement("div");
    number.className = "number";
    number.textContent = item.bj ? `${item.number || "-"}개 · 개인 ${item.bj}` : `${item.number || "-"}개`;

    const copyRow = document.createElement("div");
    copyRow.className = "copy-row";

    const audioBtn = document.createElement("button");
    audioBtn.className = "copy-btn";
    audioBtn.type = "button";
    audioBtn.textContent = "음원";

    if (item.audio) {
      audioBtn.addEventListener("click", event => {
        event.stopPropagation();
        copyText(item.audio, audioBtn);
      });
    } else {
      audioBtn.classList.add("disabled-btn");
      audioBtn.disabled = true;
    }

    const imageBtn = document.createElement("button");
    imageBtn.className = "copy-btn";
    imageBtn.type = "button";
    imageBtn.textContent = "이미지";

    if (item.image) {
      imageBtn.addEventListener("click", event => {
        event.stopPropagation();
        copyText(item.image, imageBtn);
      });
    } else {
      imageBtn.classList.add("disabled-btn");
      imageBtn.disabled = true;
    }

    copyRow.appendChild(audioBtn);
    copyRow.appendChild(imageBtn);

    card.appendChild(name);
    card.appendChild(number);
    card.appendChild(copyRow);
    grid.appendChild(card);
  });

  content.innerHTML = "";
  content.appendChild(grid);
}

async function init() {
  try {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("data.json 응답 오류");

    allData = await res.json();
    allData = Array.isArray(allData) ? allData : [];
    allData.sort((a, b) => Number(a.number) - Number(b.number));

    createTabs();
    render();
  } catch (err) {
    content.innerHTML = `<div class="empty">data.json을 불러오지 못했습니다.</div>`;
    console.error(err);
  }
}

bjSortBtn.addEventListener("click", () => {
  sortMode = sortMode === "bj" ? "number" : "bj";
  bjSortBtn.classList.toggle("active", sortMode === "bj");
  render();
});

searchInput.addEventListener("input", render);
init();
</script>
</body>
</html>
