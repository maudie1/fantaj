name: collect chat ranking

on:
  workflow_dispatch:
  schedule:
    # KST 12:10
    - cron: "10 3 * * *"
    # KST 23:10
    - cron: "10 14 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packages
        run: npm install

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Collect chat ranking
        env:
          MAX_VODS_PER_RUN: 5
        run: npm run collect:chat

      - name: Commit chat ranking data
        run: |
          git config user.name "fantaj-ranking-bot"
          git config user.email "actions@github.com"
          git add ranking/chatdata.json ranking/chatrank.json ranking/chatrank_*.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update chat ranking"
          git push
