<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>판타지유 랭킹</title>
  <link rel="icon" type="image/png" href="../favicon.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, #ffe4f3 0%, transparent 35%),
        radial-gradient(circle at top right, #dff1ff 0%, transparent 35%),
        linear-gradient(135deg, #fff0f8 0%, #f8efff 45%, #eef7ff 100%);
      min-height: 100vh;
      color: #2f2a36;
    }

    .page {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      padding: 52px 24px;
      text-align: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.95), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(179,220,255,.8), transparent 28%),
        linear-gradient(135deg, #ffb8df 0%, #e8d2ff 45%, #cfeeff 100%);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 18px 50px rgba(170,120,200,.16);
      margin-bottom: 16px;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,.24);
      filter: blur(18px);
    }

    .hero::before {
      left: -90px;
      top: -110px;
    }

    .hero::after {
      right: -100px;
      bottom: -130px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #8d6aa4;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 66px);
      color: white;
      text-shadow:
        0 4px 0 rgba(181,128,205,.45),
        0 12px 24px rgba(131,86,178,.25);
    }

    .hero-desc {
      margin-top: 10px;
      color: #7f5d92;
      font-weight: 800;
    }


    .page-nav {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin: 0 0 16px;
    }

    .page-nav a {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px 14px;
      border-radius: 20px;
      text-decoration: none;
      color: #745b86;
      font-weight: 1000;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.92);
      box-shadow: 0 10px 24px rgba(169,113,197,.12);
    }

    .page-nav a.active {
      color: white;
      background: linear-gradient(135deg, #ff79c7, #9b7bff);
      box-shadow: 0 10px 24px rgba(176,97,209,.3);
    }

    .ranking-card {
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,.85);
      box-shadow: 0 20px 45px rgba(169,113,197,.15);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 0;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 900;
      cursor: pointer;
      color: #8d6ca2;
      background: rgba(255,255,255,.88);
      box-shadow: inset 0 0 0 1px rgba(216,188,236,.55);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #ff79c7, #9b7bff);
      color: white;
      box-shadow: 0 10px 24px rgba(176,97,209,.3);
    }


    .period-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-select {
      border: 0;
      border-radius: 15px;
      background: rgba(255,255,255,.92);
      padding: 12px 14px;
      color: #765a88;
      font-weight: 800;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(220,183,238,.55);
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-box {
      border-radius: 22px;
      padding: 16px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.95),
          rgba(255,241,249,.8)
        );
      border: 1px solid rgba(255,255,255,.9);
    }

    .summary-label {
      font-size: 12px;
      color: #9c82ae;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 1000;
      color: #25bec1;
    }

    .podium {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      align-items: end;
      margin-bottom: 18px;
    }

    .winner {
      border-radius: 26px;
      padding: 18px 14px;
      text-align: center;
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,.96),
          rgba(255,241,251,.9)
        );
      border: 1px solid rgba(255,255,255,.95);
      box-shadow: 0 12px 30px rgba(177,116,195,.12);
    }

    .winner.rank-1 {
      min-height: 220px;
      background:
        linear-gradient(
          180deg,
          #fff9dc,
          #fff,
          #ffe8f7
        );
    }

    .winner.rank-2 {
      min-height: 188px;
    }

    .winner.rank-3 {
      min-height: 170px;
    }

    .crown {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      background: #f3e7fb;
      box-shadow: 0 10px 24px rgba(144,88,175,.2);
    }

    .winner-name {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 1000;
      color: #25bcc0;
    }

    .winner-tier {
      margin-top: 8px;
    }

    .winner-sub {
      margin-top: 7px;
      font-size: 12px;
      color: #9d7daf;
      font-weight: 800;
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 999px;
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.95),
          rgba(255,238,250,.9)
        );
      box-shadow:
        inset 0 0 0 1px rgba(219,185,236,.55);
      color: #745b86;
      font-size: 13px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255,255,255,.7);
      border: 1px solid rgba(255,255,255,.95);
    }

    table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th:nth-child(1),
td:nth-child(1) {
  width: 80px;
}

th:nth-child(2),
td:nth-child(2) {
  width: 38%;
}

th:nth-child(3),
td:nth-child(3) {
  width: 28%;
}

th:nth-child(4),
td:nth-child(4) {
  width: 26%;
}

    thead {
      background:
        linear-gradient(
          135deg,
          rgba(255,127,200,.18),
          rgba(167,127,255,.16)
        );
      color: #7d5a92;
    }

    th, td {
      padding: 14px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(221,199,232,.45);
    }

    tbody tr:hover {
      background: rgba(255,245,251,.72);
    }

    .rank-num {
      font-weight: 1000;
      color: #a27ab5;
      width: 70px;
    }

    .user-cell {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 220px;
      margin: 0 auto;
      gap: 10px;
      text-align: left;
      min-width: 180px;
    }

    .mini-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      background: #f3e7fb;
    }

    .nickname {
      font-weight: 1000;
      color: #24b9be;
    }

    .sub-score {
      font-size: 12px;
      color: #9c80ad;
      font-weight: 800;
    }

    .phrase {
      display: inline-block;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      color: #755c87;
      font-size: 13px;
      font-weight: 900;
      box-shadow:
        inset 0 0 0 1px rgba(220,183,238,.45);
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-weight: 900;
      color: #9d7daf;
    }

    @media (max-width: 760px) {

      .page-nav {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .page-nav a {
        min-height: 48px;
        padding: 10px 8px;
        border-radius: 16px;
        font-size: 13px;
      }

      .summary,
      .podium {
        grid-template-columns: 1fr;
      }

      th, td {
        padding: 12px 8px;
      }

      .phrase {
        max-width: 120px;
      }

      .period-box {
        width: 100%;
      }

      .month-select {
        width: 100%;
      }
    }

    /* ===== index(8).html 디자인 호환용: 배너 + 3버튼 메뉴 ===== */
    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 5%, rgba(255, 183, 217, .32), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(184, 156, 255, .25), transparent 30%),
        linear-gradient(180deg, #fff7fb 0%, #fffaf2 52%, #f4f9ff 100%);
      color: #333;
    }

    .page {
      width: min(1520px, 100%);
      margin: 0 auto;
      padding: 12px 14px 70px;
    }

    .hero-banner {
      height: 330px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 14px 38px rgba(120, 120, 180, 0.22);
      background: linear-gradient(135deg, #ffe1f0, #eee6ff);
      margin-bottom: 18px;
    }

    .hero-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.16));
      pointer-events: none;
    }

    .hero-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .view-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 0 0 18px;
    }

    .view-tab {
      appearance: none;
      border: 0;
      cursor: pointer;
      text-decoration: none;
      min-height: 86px;
      padding: 16px 18px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: inherit;
      font-weight: 900;
      box-shadow: 0 8px 22px rgba(120, 120, 180, .18);
      transition: .18s;
    }

    .view-tab:hover {
      transform: translateY(-2px);
    }

    .view-tab .tab-icon {
      font-size: 30px;
    }

    .view-tab .tab-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.15;
    }

    .view-tab .tab-title {
      font-size: 22px;
      letter-spacing: -0.7px;
    }

    .view-tab .tab-desc {
      margin-top: 5px;
      font-size: 12px;
      opacity: .72;
    }

    .view-tab.signature-tab {
      background: linear-gradient(135deg, #fff0f8, #eee6ff);
      color: #9b4b9e;
      border: 1px solid rgba(255, 183, 217, .8);
    }

    .view-tab.member-tab {
      background: linear-gradient(
        135deg,
        #f4fbff 0%,
        #e7f5ff 45%,
        #d8efff 100%
      );
      color: #5f7fa6;
      border: 1px solid rgba(180, 220, 255, 0.45);
      box-shadow:
        0 6px 18px rgba(180, 220, 255, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .view-tab.ranking-tab {
      background: linear-gradient(135deg, #fff9dc, #ffe8f7);
      color: #9a6b19;
      border: 1px solid rgba(223, 176, 68, .35);
    }

    .view-tab.ranking-tab:hover {
      box-shadow: 0 12px 30px rgba(223, 176, 68, .2);
    }

    .view-tab.active {
      outline: 4px solid rgba(255, 255, 255, .95);
      box-shadow: 0 12px 30px rgba(155, 124, 255, .28);
      transform: translateY(-1px);
    }

    .view-tab.ranking-tab.active {
      background: linear-gradient(135deg, #fff1b8, #ffd7ef);
      color: #8a5a00;
    }

    @media (max-width: 700px) {
      .page {
        width: 100%;
        padding: 10px 8px 50px;
      }

      .hero-banner {
        height: 150px;
        border-radius: 18px;
        margin-bottom: 12px;
      }

      .view-tabs {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin: 10px 0 12px;
      }

      .view-tab {
        min-height: 112px;
        padding: 12px 8px;
        border-radius: 22px;
        flex-direction: column;
        gap: 7px;
        overflow: hidden;
      }

      .view-tab:hover {
        transform: none;
      }

      .view-tab .tab-icon {
        font-size: 28px;
        line-height: 1;
      }

      .view-tab .tab-text {
        width: 100%;
        align-items: center;
        text-align: center;
        line-height: 1.15;
        min-width: 0;
      }

      .view-tab .tab-title {
        font-size: 20px;
        letter-spacing: -0.8px;
        white-space: nowrap;
        word-break: keep-all;
        overflow: hidden;
        text-overflow: clip;
      }

      .view-tab .tab-desc {
        margin-top: 6px;
        font-size: 11px;
        line-height: 1.15;
        white-space: nowrap;
        word-break: keep-all;
      }
    }

    @media (max-width: 380px) {
      .view-tab .tab-title {
        font-size: 18px;
      }

      .view-tab .tab-desc {
        font-size: 10px;
      }
    }

  </style>
</head>

<body>

  <main class="page">
    <div class="hero-banner">
      <img src="../images/banner.webp" alt="FantaJ Banner">
    </div>

    <div class="view-tabs" role="navigation" aria-label="메인 메뉴">
      <a class="view-tab signature-tab" href="../signature/">
        <span class="tab-icon">🎀</span>
        <span class="tab-text">
          <span class="tab-title">시그니처 목록</span>
          <span class="tab-desc">번호 검색 · 음원 재생</span>
        </span>
      </a>

      <a class="view-tab member-tab" href="../members/">
        <span class="tab-icon">👥</span>
        <span class="tab-text">
          <span class="tab-title">멤버 조직도</span>
          <span class="tab-desc">대표 · 멤버 · 웨이터</span>
        </span>
      </a>

      <a class="view-tab ranking-tab active" href="../ranking/">
        <span class="tab-icon">🏆</span>
        <span class="tab-text">
          <span class="tab-title">랭킹</span>
          <span class="tab-desc">후원 · 채팅 TOP 100</span>
        </span>
      </a>
    </div>


    <section class="ranking-card">

      <div class="topbar">

        <div class="tabs">
          <button class="tab-btn active" data-type="balloon">
            👑 후원 랭킹 TOP 100
          </button>

          <button class="tab-btn" data-type="chat">
            💬 채팅 랭킹 TOP 100
          </button>
        </div>

        <div class="period-box">
          <select class="month-select" id="monthSelect">
            <option value="rank.json">전체</option>
			<option value="rank_2026-05.json">2026년 5월</option>
          </select>
        </div>

      </div>

      <div class="summary">

        <div class="summary-box">
          <div class="summary-label">TOTAL SUPPORT</div>
          <div class="summary-value" id="totalBalloon">0</div>
        </div>

        <div class="summary-box">
          <div class="summary-label">TOTAL SUPPORTERS</div>
          <div class="summary-value" id="totalSupporters">0</div>
        </div>

        <div class="summary-box">
          <div class="summary-label">TOTAL CHAT</div>
          <div class="summary-value" id="totalChat">0</div>
        </div>

      </div>

      <div class="podium" id="podium"></div>

      <div class="table-wrap">

        <table>

          <thead>
            <tr>
              <th>순위</th>
              <th>닉네임</th>
              <th id="scoreHeader">후원 등급</th>
              <th id="extraHeader">후원 횟수</th>
            </tr>
          </thead>

          <tbody id="rankingBody">
            <tr>
              <td colspan="4" class="loading">
                데이터 불러오는 중...
              </td>
            </tr>
          </tbody>

        </table>

      </div>

    </section>

  </main>

  <script>

    // =========================
    // GitHub rank.json 주소
    // =========================

    const RANK_RAW_BASE_URL =
      "https://raw.githubusercontent.com/maudie1/fantaj/main/ranking/";

    const RANK_LIST_API_URL =
      "https://api.github.com/repos/maudie1/fantaj/contents/ranking?ref=main";

    let rankingData = [];
    let currentType = "balloon";
    let currentRankFile = "rank.json";

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => document.querySelectorAll(selector);

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("ko-KR");
    }

    function getProfileImage(userId) {
      const prefix = String(userId || "").slice(0, 2);

      return `https://profile.img.sooplive.co.kr/LOGO/${prefix}/${userId}/${userId}.jpg`;
    }

    function fallbackAvatar(img) {

      img.onerror = null;

      img.src =
        "data:image/svg+xml;charset=utf-8," +
        encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg"
               width="120"
               height="120"
               viewBox="0 0 120 120">
            <rect width="120"
                  height="120"
                  rx="60"
                  fill="#f3e7fb"/>
            <circle cx="60"
                    cy="46"
                    r="22"
                    fill="#c9afd9"/>
            <path d="M22 104
                     c7-25 25-38 38-38
                     s31 13 38 38"
                  fill="#c9afd9"/>
          </svg>
        `);
    }

    // =========================
    // 후원 등급
    // =========================

    function getSupportTier(amount) {

      const value = Number(amount || 0);

if (value <= 0) return { icon: "🥔", label: "STONE" };

      if (value >= 1000000) {
        return {
          icon: "🌌",
          label: "ETERNAL"
        };
      }

      if (value >= 500000) {
        return {
          icon: "👑",
          label: "LEGEND"
        };
      }

      if (value >= 200000) {
        return {
          icon: "💎",
          label: "MASTER"
        };
      }

      if (value >= 100000) {
        return {
          icon: "🟣",
          label: "DIAMOND"
        };
      }

      if (value >= 50000) {
        return {
          icon: "🔵",
          label: "PLATINUM"
        };
      }

      if (value >= 10000) {
        return {
          icon: "🟡",
          label: "GOLD"
        };
      }

      return {
        icon: "⚪",
        label: "SILVER"
      };
    }

    function getSortedData() {

      const key =
        currentType === "chat"
          ? "chat"
          : "balloon";

      return [...rankingData]
        .sort((a, b) =>
          Number(b[key] || 0) -
          Number(a[key] || 0)
        )
        .slice(0, 100);
    }

    function renderSummary() {

      const totalChat =
        rankingData.reduce(
          (sum, user) =>
            sum + Number(user.chat || 0),
          0
        );

      const totalBalloon =
        rankingData.reduce(
          (sum, user) =>
            sum + Number(user.balloon || 0),
          0
        );

      const totalSupporters =
        rankingData.filter(
          user => Number(user.balloon || 0) > 0
        ).length;

      $("#totalBalloon").textContent =
        formatNumber(totalBalloon);

      $("#totalSupporters").textContent =
        formatNumber(totalSupporters);

      $("#totalChat").textContent =
        formatNumber(totalChat);
    }

    function renderPodium(data) {

      const top3 = data.slice(0, 3);

      const order = [1, 0, 2];

      const crowns = ["🥇", "🥈", "🥉"];

      $("#podium").innerHTML = order
        .filter(index => top3[index])
        .map(index => {

          const user = top3[index];

          const rank = index + 1;

          const tier =
            getSupportTier(user.balloon);

          const subText =
            currentType === "chat"
              ? `채팅 ${formatNumber(user.chat)}회`
              : ``;

          return `
            <div class="winner rank-${rank}">

              <div class="crown">
                ${crowns[index]}
              </div>

              <img
                class="avatar"
                src="${getProfileImage(user.id)}"
                onerror="fallbackAvatar(this)"
                alt="${user.nickname}"
              >

              <div class="winner-name">
                ${user.nickname}
              </div>

              <div class="winner-tier">
                <span class="tier-badge">
                  ${tier.icon} ${tier.label}
                </span>
              </div>

              <div class="winner-sub">
                ${subText}
              </div>

            </div>
          `;
        })
        .join("");
    }

    function renderTable(data) {

      $("#scoreHeader").textContent =
        currentType === "chat"
          ? "채팅 횟수"
          : "후원 등급";

      $("#extraHeader").textContent =
        currentType === "chat"
          ? "대표 문구"
          : "후원 횟수";

      $("#rankingBody").innerHTML = data
        .map((user, index) => {

          const tier =
            getSupportTier(user.balloon);

          const score =
            currentType === "chat"
              ? `
                <div style="font-weight:1000;">
                  ${formatNumber(user.chat)}회
                </div>
              `
              : `
                <span class="tier-badge">
                  ${tier.icon} ${tier.label}
                </span>
              `;

          const extra =
            currentType === "chat"
              ? `
                <span class="phrase">
                  ${user.topword || "-"}
                </span>
              `
              : `
                <div class="sub-score">
                  총 ${formatNumber(user.donateCount)}회
                </div>
              `;

          return `
            <tr>

              <td class="rank-num">
                ${index + 1}
              </td>

              <td>

                <div class="user-cell">

                  <img
                    class="mini-avatar"
                    src="${getProfileImage(user.id)}"
                    onerror="fallbackAvatar(this)"
                    alt="${user.nickname}"
                  >

                  <div>

                    <div class="nickname">
                      ${user.nickname}
                    </div>

                  </div>

                </div>

              </td>

              <td>
                ${score}
              </td>

              <td>
                ${extra}
              </td>

            </tr>
          `;
        })
        .join("");
    }

    function render() {

      const data = getSortedData();

      renderSummary();
      renderPodium(data);
      renderTable(data);
    }

    function getMonthLabel(fileName) {

      const match =
        fileName.match(/^rank_(\d{4})-(\d{2})\.json$/);

      if (!match) return "전체";

      return `${match[1]}년 ${Number(match[2])}월`;
    }

    async function loadMonthOptions() {

      try {

        const response =
          await fetch(
            `${RANK_LIST_API_URL}&v=${Date.now()}`
          );

        const files = await response.json();

        const monthFiles = files
          .filter(file =>
            /^rank_\d{4}-\d{2}\.json$/.test(file.name)
          )
          .map(file => file.name)
          .sort()
          .reverse();

        const monthSelect = $("#monthSelect");

        monthSelect.innerHTML = `
          <option value="rank.json">전체</option>
        `;

        monthFiles.forEach(fileName => {
          const option = document.createElement("option");
          option.value = fileName;
          option.textContent = getMonthLabel(fileName);
          monthSelect.appendChild(option);
        });

      } catch (error) {

        console.error(error);
      }
    }

    async function loadRankingData(fileName = "rank.json") {

      try {

        $("#rankingBody").innerHTML = `
          <tr>
            <td colspan="4" class="loading">
              데이터 불러오는 중...
            </td>
          </tr>
        `;

        currentRankFile = fileName;

        const response =
          await fetch(
            `${RANK_RAW_BASE_URL}${fileName}?v=${Date.now()}`
          );

        const data = await response.json();

        rankingData = Array.isArray(data) ? data : [];

        render();

      } catch (error) {

        console.error(error);

        rankingData = [];

        $("#podium").innerHTML = "";

        $("#totalBalloon").textContent = "0";
        $("#totalSupporters").textContent = "0";
        $("#totalChat").textContent = "0";

        $("#rankingBody").innerHTML = `
          <tr>
            <td colspan="4" class="loading">
              데이터 불러오기 실패
            </td>
          </tr>
        `;
      }
    }

    $$(".tab-btn").forEach(button => {

      button.addEventListener("click", () => {

        $$(".tab-btn").forEach(btn =>
          btn.classList.remove("active")
        );

        button.classList.add("active");

        currentType =
          button.dataset.type;

        render();
      });
    });

    $("#monthSelect").addEventListener("change", (event) => {
      loadRankingData(event.target.value);
    });

    loadMonthOptions();
    loadRankingData();

  </script>

</body>
</html>
