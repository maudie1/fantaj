<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지유 시그니처 목록</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff7fb;
  color: #333;
}

.header {
  margin: 14px;
  padding: 18px;
  text-align: center;
  font-size: 28px;
  font-weight: 900;
  border-radius: 18px;
  background: linear-gradient(135deg, #ff8fc7, #b89cff);
  color: white;
  box-shadow: 0 6px 18px rgba(255, 143, 199, .35);
}

.top-panel {
  margin: 16px;
  padding: 14px;
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.88);
  border: 1px solid #f2d7e6;
  box-shadow: 0 6px 18px rgba(255, 143, 199, .18);
  display: grid;
  grid-template-columns: 58% 42%;
  gap: 14px;
  align-items: center;
  box-sizing: border-box;
}

.search-box input {
  width: 100%;
  box-sizing: border-box;
  padding: 14px 18px;
  font-size: 17px;
  border: 2px solid #ffb7d9;
  border-radius: 999px;
  outline: none;
  background: #fff;
}

.search-box input:focus {
  border-color: #b89cff;
  box-shadow: 0 0 0 4px rgba(184, 156, 255, .18);
}

.volume-box {
  padding: 12px 16px;
  border-radius: 999px;
  background: linear-gradient(135deg, #fff0f8, #f3edff);
  display: flex;
  align-items: center;
  gap: 10px;
  color: #ff5eaa;
  font-weight: 900;
  box-sizing: border-box;
  min-width: 0;
}

.volume-label {
  white-space: nowrap;
  font-size: 14px;
}

.volume-box input {
  flex: 1;
  min-width: 80px;
  accent-color: #ff77b7;
}

#volumeText {
  min-width: 42px;
  text-align: right;
  color: #9b7cff;
  font-size: 14px;
}

.section {
  margin: 24px 14px 70px;
}

.section-title {
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 20px;
  font-weight: 900;
  color: white;
  background: linear-gradient(135deg, #ff77b7, #9b7cff);
  box-shadow: 0 4px 12px rgba(155, 124, 255, .25);
  margin-bottom: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 150px);
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid #f2d7e6;
  border-radius: 18px;
  padding: 8px;
  text-align: center;
  cursor: pointer;
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(255, 143, 199, .18);
  transition: .18s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(155, 124, 255, .28);
}

.card.playing {
  outline: 4px solid #ff77b7;
}

.card.loading {
  outline: 4px solid #b89cff;
}

.thumb {
  width: 132px;
  height: 70px;
  border-radius: 12px;
  object-fit: cover;
  background: linear-gradient(135deg, #ffe1f0, #eee6ff);
}

.no-image {
  width: 132px;
  height: 70px;
  border-radius: 12px;
  background: linear-gradient(135deg, #ffe1f0, #eee6ff);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9b7cff;
  font-weight: 900;
  font-size: 13px;
}

.name {
  margin-top: 8px;
  font-size: 13px;
  font-weight: 900;
  line-height: 1.25;
}

.count {
  margin-top: 6px;
  margin-bottom: 6px;
  color: #ff5eaa;
  font-size: 13px;
  font-weight: 900;
}

@media (max-width: 700px) {
  .top-panel {
    grid-template-columns: 1fr;
    margin: 10px;
    padding: 10px;
    gap: 10px;
  }

  .header {
    margin: 10px;
    padding: 14px;
    font-size: 22px;
    border-radius: 16px;
  }

  .search-box input {
    padding: 12px 14px;
    font-size: 15px;
  }

  .volume-box {
    padding: 10px 12px;
  }

  .section {
    margin: 18px 8px 46px;
  }

  .section-title {
    padding: 11px 13px;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .card {
    padding: 4px;
    border-radius: 12px;
  }

  .card:hover {
    transform: none;
  }

  .thumb,
  .no-image {
    width: 100%;
    height: 46px;
    border-radius: 8px;
  }

  .no-image {
    font-size: 10px;
  }

  .name {
    margin-top: 4px;
    font-size: 10px;
    line-height: 1.15;
    word-break: keep-all;
  }

  .count {
    margin-top: 2px;
    margin-bottom: 2px;
    font-size: 10px;
  }
}

@media (min-width: 701px) {
  .volume-box {
    margin-right: 14px;
  }
}
</style>
</head>

<body>

<div class="header">판타지유 시그니처 목록</div>

<div class="top-panel">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="번호 또는 이름 검색">
  </div>

  <div class="volume-box">
    <span class="volume-label">🔊 </span>
    <input id="volumeControl" type="range" min="0" max="1" step="0.01" value="0.5">
    <span id="volumeText">50%</span>
  </div>
</div>

<div id="content"></div>

<audio id="player" playsinline preload="none"></audio>

<script>
const API_URL = "data.json";

let allData = [];
let currentUrl = "";
let currentCard = null;
let volume = 0.5;

const player = document.getElementById("player");
const content = document.getElementById("content");
const searchInput = document.getElementById("searchInput");
const volumeControl = document.getElementById("volumeControl");
const volumeText = document.getElementById("volumeText");

volumeControl.addEventListener("input", e => {
  volume = Number(e.target.value);
  volumeText.textContent = Math.round(volume * 100) + "%";
  player.volume = volume;
});

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    allData = Array.isArray(data) ? data : [];
    render(allData);
  })
  .catch(() => {
    content.innerHTML = `
      <div style="margin:16px;padding:22px;border-radius:16px;background:white;color:#9b7cff;font-weight:900;text-align:center;">
        데이터를 불러오지 못했습니다.
      </div>
    `;
  });

searchInput.addEventListener("input", e => {
  const keyword = e.target.value.trim().toLowerCase();

  const filtered = allData.filter(item =>
    String(item.number).includes(keyword) ||
    String(item.name || "").toLowerCase().includes(keyword)
  );

  render(filtered);
});

function render(data) {
  const groups = [
    { title: "1~1999", min: 1, max: 1999 },
    { title: "2000~2999", min: 2000, max: 2999 },
    { title: "3000~4999", min: 3000, max: 4999 },
    { title: "5000~9999", min: 5000, max: 9999 },
    { title: "10000~300000", min: 10000, max: 300000 }
  ];

  content.innerHTML = "";

  groups.forEach(group => {
    const items = data.filter(item => {
      const num = Number(item.number);
      return num >= group.min && num <= group.max;
    });

    if (items.length === 0) return;

    const section = document.createElement("div");
    section.className = "section";

    const sectionTitle = document.createElement("div");
    sectionTitle.className = "section-title";
    sectionTitle.textContent = `${group.title} (${items.length}개)`;

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(item => {
      grid.appendChild(createCard(item));
    });

    section.appendChild(sectionTitle);
    section.appendChild(grid);
    content.appendChild(section);
  });
}

function createCard(item) {
  const card = document.createElement("div");
  card.className = "card";

  const imageUrl = getImageUrl(item.image);

if (imageUrl) {
  const img = document.createElement("img");
  img.className = "thumb";
  img.src = imageUrl;
    img.alt = item.name || String(item.number);
    img.loading = "lazy";
    img.decoding = "async";

    img.onerror = () => {
      const noImage = document.createElement("div");
      noImage.className = "no-image";
      noImage.textContent = "이미지 없음";
      img.replaceWith(noImage);
    };

    card.appendChild(img);
  } else {
    const noImage = document.createElement("div");
    noImage.className = "no-image";
    noImage.textContent = "이미지 없음";
    card.appendChild(noImage);
  }

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = `${item.number} ${item.name || ""}`;

  const count = document.createElement("div");
  count.className = "count";
  count.textContent = `${item.number}개`;

  card.appendChild(name);
  card.appendChild(count);

  card.addEventListener("click", () => {
    playAudio(item.audio || "", card);
  });

  return card;
}

function getFileName(url) {
  if (!url) return "";

  try {
    return decodeURIComponent(String(url).split("/").pop().split("?")[0]);
  } catch (e) {
    return String(url).split("/").pop().split("?")[0];
  }
}

function getImageUrl(url) {
  if (!url) return "";

  const cleanUrl = String(url).split("?")[0].toLowerCase();

  // GIF는 JSON에 있는 외부링크 그대로 사용
  if (cleanUrl.endsWith(".gif")) {
    return url;
  }

  // PNG는 파일명만 뽑아서 /images 폴더 사용
  const fileName = getFileName(url);
  return fileName ? `images/${fileName}` : "";
}

function playAudio(url, card) {
  if (!url) return;

  if (currentUrl === url && !player.paused) {
    stopAudio();
    return;
  }

  stopAudio();

  currentUrl = url;
  currentCard = card;

  currentCard.classList.add("loading");

  player.src = url;
  player.volume = volume;
  player.preload = "auto";
  player.load();

  const playPromise = player.play();

  if (playPromise) {
    playPromise
      .then(() => {
        setPlayingState();
      })
      .catch(() => {
        player.addEventListener("canplay", retryPlay, { once: true });
      });
  }
}

function retryPlay() {
  player.play()
    .then(() => {
      setPlayingState();
    })
    .catch(() => {
      stopAudio();
    });
}

function setPlayingState() {
  if (!currentCard) return;

  currentCard.classList.remove("loading");
  currentCard.classList.add("playing");
}

function stopAudio() {
  player.pause();

  try {
    player.currentTime = 0;
  } catch (e) {}

  if (currentCard) {
    currentCard.classList.remove("playing");
    currentCard.classList.remove("loading");
  }

  currentUrl = "";
  currentCard = null;
}

player.addEventListener("playing", setPlayingState);
player.addEventListener("ended", stopAudio);
player.addEventListener("error", stopAudio);
</script>

</body>
</html>
