<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANTAJ 업데이트 안내</title>
  <meta name="description" content="FANTAJ 사이트 업데이트 중입니다." />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/fantajicon192.png">
  <link rel="apple-touch-icon" href="/fantajicon512.png">
  <meta name="theme-color" content="#b678ff">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --text: #3d3148;
      --muted: #7c6d85;
      --pink: #ff7eb7;
      --purple: #a965e8;
      --deep: #8f4eb2;
      --soft: rgba(255, 255, 255, 0.76);
      --shadow: 0 26px 70px rgba(150, 94, 171, 0.16);
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 215, 239, 0.95), transparent 28%),
        radial-gradient(circle at 82% 20%, rgba(218, 200, 255, 0.9), transparent 30%),
        radial-gradient(circle at 50% 88%, rgba(255, 236, 201, 0.86), transparent 32%),
        linear-gradient(180deg, #fff7fb 0%, #f7f0ff 48%, #fffaf4 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: 0 8px 28px rgba(177, 122, 174, 0.12);
    }

    .nav-inner {
      width: min(1180px, calc(100% - 32px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: 0.12em;
      color: var(--deep);
    }

    .status-badge {
      padding: 9px 15px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #ffffff;
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 8px 20px rgba(177, 92, 201, 0.24);
      white-space: nowrap;
    }

    main {
      flex: 1;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 54px 0 74px;
    }

    .coming-card {
      position: relative;
      width: min(860px, 100%);
      min-height: 520px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 58px 34px;
      border-radius: 16px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.88), rgba(255,246,252,0.78)),
        radial-gradient(circle at 50% 24%, rgba(255, 255, 255, 0.92), transparent 28%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .coming-card::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 12px;
      background:
        radial-gradient(circle at 20% 24%, rgba(255, 126, 183, 0.18), transparent 22%),
        radial-gradient(circle at 78% 28%, rgba(169, 101, 232, 0.17), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255, 216, 164, 0.24), transparent 28%);
      pointer-events: none;
    }

    .coming-card::after {
      content: "♪";
      position: absolute;
      right: 34px;
      bottom: 14px;
      font-size: 106px;
      font-weight: 950;
      color: rgba(176, 92, 201, 0.09);
      line-height: 1;
      pointer-events: none;
    }

    .coming-content {
      position: relative;
      z-index: 1;
      width: min(680px, 100%);
    }

    .icon-box {
      width: 86px;
      height: 86px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 34px rgba(150, 94, 171, 0.14);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .kicker {
      font-size: 14px;
      font-weight: 950;
      letter-spacing: 0.28em;
      color: #a061bb;
      margin-bottom: 15px;
    }

    h1 {
      font-size: clamp(46px, 8vw, 86px);
      font-weight: 950;
      letter-spacing: 0.1em;
      color: #ffffff;
      text-shadow: 0 9px 32px rgba(117, 67, 151, 0.28);
      line-height: 1.02;
    }

    .date {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255, 126, 183, 0.16), rgba(169, 101, 232, 0.16));
      color: #8f4eb2;
      font-size: clamp(20px, 4vw, 34px);
      font-weight: 950;
      letter-spacing: 0.08em;
      box-shadow: inset 0 0 0 1px rgba(169, 101, 232, 0.18);
    }

    .message {
      margin: 24px auto 0;
      max-width: 560px;
      color: #6f527c;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.72;
      word-break: keep-all;
    }

    .small-message {
      margin-top: 16px;
      color: #9a8aa3;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.55;
      word-break: keep-all;
    }

    .footer {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto 26px;
      padding: 15px 0 4px;
      text-align: center;
      color: rgba(124, 109, 133, 0.82);
    }

    .footer-brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0.18em;
      color: rgba(143, 78, 178, 0.82);
      line-height: 1;
    }

    .footer-icon {
      width: 22px;
      height: 22px;
      object-fit: cover;
      display: block;
    }

    .footer-info {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 650;
      line-height: 1.55;
      color: rgba(138, 120, 147, 0.76);
      word-break: keep-all;
    }

    @media (max-width: 640px) {
      .navbar {
        height: auto;
        padding: 12px 0 10px;
      }

      .nav-inner {
        width: min(1180px, calc(100% - 24px));
      }

      .logo {
        font-size: 22px;
        letter-spacing: 0.1em;
      }

      .status-badge {
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
      }

      main {
        width: min(100% - 20px, 1180px);
        padding: 28px 0 46px;
      }

      .coming-card {
        min-height: 470px;
        padding: 42px 20px;
        border-radius: 13px;
      }

      .coming-card::before {
        inset: 10px;
        border-radius: 10px;
      }

      .coming-card::after {
        right: 16px;
        bottom: 8px;
        font-size: 72px;
      }

      .icon-box {
        width: 70px;
        height: 70px;
        border-radius: 13px;
        margin-bottom: 20px;
      }

      .kicker {
        font-size: 11px;
        letter-spacing: 0.22em;
      }

      h1 {
        font-size: 42px;
        letter-spacing: 0.08em;
      }

      .date {
        margin-top: 20px;
        padding: 11px 14px;
        border-radius: 8px;
        font-size: 23px;
      }

      .message {
        margin-top: 22px;
        font-size: 15px;
        line-height: 1.68;
      }

      .small-message {
        font-size: 12px;
      }

      .footer {
        width: min(100% - 24px, 1180px);
        margin-bottom: 22px;
        padding-top: 13px;
      }

      .footer-brand {
        font-size: 11px;
      }

      .footer-icon {
        width: 20px;
        height: 20px;
      }

      .footer-info {
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="navbar">
      <div class="nav-inner">
        <a class="logo" href="/">FANTAJ</a>
        <div class="status-badge">UPDATE</div>
      </div>
    </header>

    <main>
      <section class="coming-card" aria-label="사이트 업데이트 안내">
        <div class="coming-content">
          <div class="kicker">FANTAJ SITE UPDATE</div>
          <h1>COMING SOON</h1>
          <div class="date">2026.06.08</div>
          <p class="message">
            더 좋은 모습으로 준비 중입니다.
          </p>
          <p class="small-message">
            이용에 불편을 드려 죄송합니다. 조금만 기다려주세요.
          </p>
        </div>
      </section>
    </main>

  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
